function renderDebtCard(d, isPriority) {
  const ccy = debtCcy(d);
  const primary = state.profile.currency;
  const isForeign = ccy !== primary;
  const monthlyInt = d.balance * (d.rate / 100 / 12);
  const warn = !d.paidOff ? debtWarning(d) : null;
  const convertedBalance = isForeign ? toPrimary(d.balance, ccy) : null;
  const convertedMin = isForeign ? toPrimary(d.minPayment || 0, ccy) : null;
  const convertedInt = isForeign ? toPrimary(monthlyInt, ccy) : null;
  const hasRates = !!state.profile.rates;
  const cat = categoryMeta(d.category || 'other');

  return `
    <div class="debt-card ${d.paidOff ? 'paid' : ''} ${isPriority ? 'priority' : ''}" data-edit-debt="${d.id}">
      <div class="debt-top">
        <div>
          <div class="debt-creditor">${esc(d.creditor)}${isPriority ? '<span class="priority-tag">Prioridad</span>' : ''}</div>
          <div class="debt-sub"><span class="category-pill" style="margin-left:0">${cat.short}</span> ${d.paidOff ? '· Cerrada' : `· Tasa ${d.rate}% · Vence día ${d.dueDay}${isForeign ? ' · ' + ccy : ''}`}</div>
        </div>
        <div>
          <div class="debt-amount">${fmt(d.balance, ccy)}</div>
          ${isForeign && hasRates ? `<div class="debt-amount-alt">≈ ${fmt(convertedBalance, primary)}</div>` : ''}
          ${isForeign && !hasRates ? `<div class="debt-amount-alt">≈ —</div>` : ''}
        </div>
      </div>
      ${!d.paidOff ? `
        <div class="debt-meta">
          <span>Cuota mín. <strong>${fmt(d.minPayment, ccy)}</strong></span>
          <span>Interés/mes <strong>${fmt(monthlyInt, ccy)}</strong></span>
        </div>
        ${warn ? `<div class="debt-warn">${warn}</div>` : ''}
        ${(() => {
          const init = d.initialBalance || d.balance;
          if (!init || init <= d.balance) return '';
          const reduction = init - d.balance;
          const pct = (reduction / init) * 100;
          if (pct < 5) return '';
          return `
            <div class="debt-progress">
              <div class="debt-progress-bar">
                <div class="debt-progress-bar-fill" style="width: ${Math.min(100, pct)}%"></div>
              </div>
              <div class="debt-progress-label">Has reducido ${pct.toFixed(0)}% · ${fmt(reduction, ccy)}</div>
            </div>
          `;
        })()}
        <div style="margin-top: 12px;">
          <button class="tip-cta" data-negotiate-debt="${d.id}">Ver guion para negociar →</button>
        </div>
      ` : ''}
    </div>
  `;
}

function viewPlan() {
  const a = active();
  const today = new Date();
  const todayDay = today.getDate();
  const priority = priorityDebt();
  const strat = currentStrategy();
  const primary = state.profile.currency;

  const upcoming = a.map(d => {
    let daysUntil = d.dueDay - todayDay;
    if (daysUntil < 0) daysUntil += 30; // aproximación: próximo mes
    return { ...d, daysUntil };
  }).filter(d => d.daysUntil <= 7).sort((a,b) => a.daysUntil - b.daysUntil);

  // Total de la semana en moneda principal (convirtiendo cada cuota según su moneda)
  const weekTotal = upcoming.reduce((s, d) => s + toPrimary(d.minPayment || 0, debtCcy(d)), 0);
  const income = state.profile.income || 0;
  const hasForeign = upcoming.some(d => debtCcy(d) !== primary);

  return `
    <div class="screen fade-in">
      <div class="nav-header">
        <button class="back-btn" data-go="dashboard">←</button>
        <div class="eyebrow" style="margin:0">Esta semana</div>
      </div>

      <h2 class="form-title">Tu plan</h2>
      <p class="form-subtitle">Lo que vence en los próximos 7 días.</p>

      ${upcoming.length === 0 ? `
        <div class="empty">
          <div class="empty-mark">·</div>
          <div class="empty-title">Ninguna cuota esta semana</div>
          <div class="empty-body">Respira. Si te sobra algo, puedes adelantar en la deuda prioritaria.</div>
        </div>
      ` : `
        <div class="week-total">
          <div class="eyebrow">Total de la semana</div>
          <div style="font-family: 'Fraunces', Georgia, serif; font-size: 36px; font-weight: 500; letter-spacing: -0.02em; margin-top: 8px; font-variant-numeric: tabular-nums;">${fmt(weekTotal)}</div>
          ${income > 0 ? `<div style="font-size: 12px; color: var(--muted); margin-top: 6px;">≈ ${Math.round((weekTotal/income)*100)}% de tu ingreso mensual</div>` : ''}
          ${hasForeign ? `<div style="font-size: 12px; color: var(--muted); margin-top: 8px; font-family: 'Plus Jakarta Sans', sans-serif;">Total en ${primary}, convertido con tasa del día</div>` : ''}
        </div>

        <div>
          ${upcoming.map(d => {
            const ccy = debtCcy(d);
            const isForeign = ccy !== primary;
            return `
            <div class="plan-day">
              <div class="plan-day-head">
                <div>
                  <div class="plan-date">${d.daysUntil === 0 ? 'Hoy' : d.daysUntil === 1 ? 'Mañana' : `En ${d.daysUntil} días`}</div>
                  <div class="plan-date-sub">Día ${d.dueDay} del mes</div>
                </div>
              </div>
              <div class="plan-item">
                <span class="plan-item-name">${esc(d.creditor)}${isForeign ? ` <span style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0;">· ${ccy}</span>` : ''}</span>
                <span class="plan-item-amount">${fmt(d.minPayment, ccy)}${isForeign ? `<div style="font-size: 11px; color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; margin-top: 3px; font-variant-numeric: tabular-nums;">≈ ${fmt(toPrimary(d.minPayment, ccy), primary)}</div>` : ''}</span>
              </div>
            </div>
          `;}).join('')}
        </div>
      `}

      ${priority && a.length > 1 ? `
        <div class="note-card">
          <div class="note-title">Si te queda algo extra</div>
          <div class="note-body">
            Dirígelo a <strong>${esc(priority.creditor)}</strong>.
            ${strat === 'avalanche'
              ? `Es la que más te cobra (${priority.rate}% anual). Cada peso extra ahí te ahorra intereses.`
              : `Es la más pequeña. Cerrarla pronto te dará claridad emocional para seguir.`
            }

        </div>
      ` : ''}

      <button class="btn mt-lg" data-go="dashboard">Volver</button>
    </div>
  `;
}

function viewSimulator() {
  const a = active();
  if (a.length === 0) {
    return `
      <div class="screen fade-in">
        <div class="nav-header">
          <button class="back-btn" data-go="dashboard">←</button>
          <div class="eyebrow">Simulador</div>

        </div>
      </div>
    `;
  }

  const mode = state.simMode || 'extra';
  let inputsHtml = '';

  if (mode === 'extra') {
    const amount = state.simExtra || 0;
    inputsHtml = `
      <div class="field">
        <label class="field-label">Pago extra mensual</label>
        <input class="field-input" id="sim-extra-input" type="number" value="${amount || ''}" placeholder="Ej: 100000" inputmode="decimal" min="0" step="1">
        <div class="field-hint">Se suma al total de cuotas mínimas y se dirige a la deuda prioritaria.</div>
      </div>
    `;
  } else if (mode === 'lumpSum') {
    const amount = state.simLumpAmount || 0;
    const targetId = state.simLumpTarget || (priorityDebt() && priorityDebt().id) || a[0].id;
    inputsHtml = `
      <div class="field">
        <label class="field-label">Pago único (bono, prima, devolución…)</label>
        <input class="field-input" id="sim-lump-input" type="number" value="${amount || ''}" placeholder="Ej: 2000000" inputmode="decimal" min="0" step="1">
      </div>
      <div class="field">
        <label class="field-label">Dirigido a</label>
        <select class="field-input field-select" id="sim-lump-target">
          ${a.map(d => `<option value="${d.id}" ${d.id === targetId ? 'selected' : ''}>${esc(d.creditor)} — ${fmt(d.balance, debtCcy(d))}</option>`).join('')}
        </select>
      </div>
    `;
  } else if (mode === 'rate') {
    const targetId = state.simRateTarget || (priorityDebt() && priorityDebt().id) || a[0].id;
    const target = a.find(x => x.id === targetId) || a[0];
    const newRate = state.simNewRate !== undefined ? state.simNewRate : Math.max(0, target.rate - 5);
    inputsHtml = `
      <div class="field">
        <label class="field-label">¿Qué deuda quieres renegociar?</label>
        <select class="field-input field-select" id="sim-rate-target">
          ${a.map(d => `<option value="${d.id}" ${d.id === targetId ? 'selected' : ''}>${esc(d.creditor)} — ${d.rate}% actual</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label class="field-label">Nueva tasa anual (%)</label>
        <input class="field-input" id="sim-rate-input" type="number" value="${newRate}" inputmode="decimal" min="0" max="200" step="0.5">
        <div class="field-hint">Prueba con lo que crees que puedes lograr negociando.</div>
      </div>
    `;
  }

  return `
    <div class="screen fade-in">
      <div class="nav-header">
        <button class="back-btn" data-go="dashboard">←</button>
        <div class="eyebrow">Simulador</div>
      </div>

      <h2 class="form-title">¿Qué pasaría si...?</h2>
      <p class="form-subtitle">Juega con escenarios. Nada cambia tus deudas reales — es un espacio para pensar.</p>

        <button class="sim-tab ${mode === 'lumpSum' ? 'active' : ''}" data-sim-mode="lumpSum">Pago único</button>
        <button class="sim-tab ${mode === 'rate' ? 'active' : ''}" data-sim-mode="rate">Baja de tasa</button>
      </div>

      <div class="sim-card">
        ${inputsHtml}
      </div>

      <div id="sim-dynamic">${buildSimResultHTML()}</div>
    </div>
  `;
}

// Genera SOLO la sección de resultado + footer condicional del simulador.
// Separada de viewSimulator para permitir actualizaciones parciales del DOM
// sin destruir los inputs donde el usuario está tecleando (que en móvil
// causaba pérdida de foco y cierre del teclado virtual).
function buildSimResultHTML() {
  const a = active();
  if (a.length === 0) return '';
  const mode = state.simMode || 'extra';
  const baseline = simulateScenario();
  const primary = state.profile.currency;

  let scenarioOpts = {};
  if (mode === 'extra') {
    scenarioOpts = { extraMonthly: toPrimary(state.simExtra || 0, primary) };
  } else if (mode === 'lumpSum') {
    const targetId = state.simLumpTarget || (priorityDebt() && priorityDebt().id) || a[0].id;
    scenarioOpts = { lumpSum: { amount: toPrimary(state.simLumpAmount || 0, primary), targetId } };
  } else if (mode === 'rate') {
    const targetId = state.simRateTarget || (priorityDebt() && priorityDebt().id) || a[0].id;
    const target = a.find(x => x.id === targetId) || a[0];
    const newRate = state.simNewRate !== undefined ? state.simNewRate : Math.max(0, target.rate - 5);
    scenarioOpts = { rateOverride: { id: targetId, rate: parseFloat(newRate) || 0 } };
  }

  const scenario = simulateScenario(scenarioOpts);
  const savedMonths = baseline.error || scenario.error ? null : Math.max(0, baseline.months - scenario.months);
  const savedInterest = baseline.error || scenario.error ? null : Math.max(0, baseline.totalInterest - scenario.totalInterest);

  let resultHtml;
  if (scenario.error === 'budget_insufficient') {
    resultHtml = `
      <div class="sim-result error">
        <div class="sim-result-title">Las cuotas no alcanzan ni para los intereses</div>
        <div class="sim-result-body">En este escenario la deuda nunca se cerraría. Prueba con un extra mayor, o primero negocia tasas.</div>
      </div>
    `;
  } else if (scenario.error) {
    resultHtml = `<div class="sim-result error"><div class="sim-result-title">Escenario muy largo</div><div class="sim-result-body">El cálculo supera 60 años. Ajusta los números.</div></div>`;
  } else {
    const noChange = savedMonths === 0 && savedInterest < 1;
    resultHtml = `
      <div class="sim-result">
        <div class="sim-delta-grid">
          <div class="sim-delta">
            <div class="sim-delta-label">Nueva libertad</div>
            <div class="sim-delta-val">${fmtDate(scenario.freedom)}</div>
            ${baseline.freedom && !noChange ? `<div class="sim-delta-sub">antes: ${fmtDate(baseline.freedom)}</div>` : ''}
          </div>
          <div class="sim-delta">
            <div class="sim-delta-label">Meses ${savedMonths > 0 ? 'ahorrados' : 'más'}</div>
            <div class="sim-delta-val ${savedMonths > 0 ? 'positive' : ''}">${savedMonths != null ? (savedMonths > 0 ? '−' + savedMonths : savedMonths) : '—'}</div>
          </div>
          <div class="sim-delta">
            <div class="sim-delta-label">Intereses ahorrados</div>
            <div class="sim-delta-val ${savedInterest > 1 ? 'positive' : ''}">${savedInterest != null ? fmt(savedInterest) : '—'}</div>
          </div>
        </div>
        ${noChange ? `<div class="sim-note">Ajusta los números arriba para ver el impacto.</div>` : ''}
      </div>
    `;
  }

  const footerHtml = (mode === 'rate' && !scenario.error) ? `
    <div class="note-card" style="margin-top: 20px;">
      <div class="note-title">¿Cómo lograr esa tasa?</div>
      <div class="note-body">Hay un guion listo para pedir reducción. Toma 10 minutos llamar.</div>
      <button class="btn btn-secondary mt-sm" data-open-negotiate="${state.simRateTarget || a[0].id}">Ver guion de negociación</button>
    </div>
  ` : '';

  return resultHtml + footerHtml;
}

// Actualización parcial: reemplaza solo la sección dinámica del simulador
// sin tocar los inputs. Preserva foco y selección del usuario.
function updateSimResult() {
  const container = document.getElementById('sim-dynamic');
  if (!container) return;
  container.innerHTML = buildSimResultHTML();
  // Re-enganchar el único handler que aparece dentro de la sección dinámica
  const openNeg = container.querySelector('[data-open-negotiate]');
  if (openNeg) {
    openNeg.addEventListener('click', () => {
      state.negotiatingDebt = openNeg.dataset.openNegotiate;
      state.negScriptId = null;
      goTo('negotiate');
    });
  }
}

function renderModal() {
  if (!state.modal) return '';
  const m = state.modal;

  // Variante milestone — celebración de hito. Reutiliza .milestone-card como protagonista
  // y le quita el chrome al modal para que la tarjeta respire.
  if (m.kind === 'milestone') {
    return `
      <div class="modal-backdrop" data-modal-close>
        <div class="modal milestone-modal" onclick="event.stopPropagation()">
          <div class="milestone-card">
            <div class="milestone-tag">${esc(m.tag || '')}</div>
            <div class="milestone-msg">${esc(m.msg || '')}</div>
            <div class="milestone-sub">${esc(m.sub || '')}</div>
          </div>
          <button class="btn milestone-confirm" data-modal-confirm>Seguir</button>
        </div>
      </div>
    `;
  }

  // Para listas largas (moneda: 12 opciones), usar un listado compacto con marca de "actual"
  const useCompactList = m.options && m.options.length > 4;
  const currentValue = m.kind === 'currency' ? state.profile.currency : (m.kind === 'strategy' ? state.profile.strategy : null);
  let optionsHtml = '';
  if (m.options) {
    if (useCompactList) {
      optionsHtml = `
        <div class="modal-option-list">
          ${m.options.map(o => `<button data-modal-option="${o.value}" class="${o.value === currentValue ? 'current' : ''}">${o.label}</button>`).join('')}
        </div>
        <button class="btn-ghost" data-modal-close>Cancelar</button>
      `;
    } else {
      optionsHtml = `
        <div class="stack">
          ${m.options.map((o,i) => `<button class="btn ${i === 0 ? '' : 'btn-secondary'}" data-modal-option="${o.value}">${o.label}</button>`).join('')}
        </div>
        <button class="btn-ghost mt-sm" data-modal-close>Cancelar</button>
      `;
    }
  }
  return `
    <div class="modal-backdrop" data-modal-close>
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">${m.title}</div>
        <div class="modal-body">${m.body}</div>
        ${m.input ? `<div class="field"><input class="field-input" id="modal-input" type="${m.inputType || 'text'}" value="${esc(m.inputValue || '')}" placeholder="${esc(m.placeholder || '')}" ${m.inputType === 'number' ? 'inputmode="numeric"' : ''} autofocus></div>` : ''}
        ${m.options ? optionsHtml : `
        <div class="btn-row mt-md">
          ${m.singleAction ? '' : '<button class="btn btn-secondary" data-modal-close>Cancelar</button>'}
          <button class="btn ${m.danger ? 'btn-danger' : ''}" data-modal-confirm>${m.confirmText || 'Aceptar'}</button>
        </div>
        `}
      </div>
    </div>
  `;
}

// ============== RENDER ==============
function render() {
  const app = document.getElementById('app');

  // Preservar foco + posición del cursor antes del rerender.
  // Sin esto, cualquier cambio de state.X seguido de render() destruye el input y saca al usuario del campo.
  const activeEl = document.activeElement;
  let focusId = null;
  let selStart = null;
  let selEnd = null;
  if (activeEl && activeEl.id && app.contains(activeEl)) {
    focusId = activeEl.id;
    // selectionStart/End no está disponible en type="number" ni en selects; lo envolvemos.
    try { selStart = activeEl.selectionStart; selEnd = activeEl.selectionEnd; } catch (_) { /* no-op */ }
  }

  let html = '';
  switch (state.view) {
    case 'welcome': html = viewWelcome(); break;
    case 'onboarding': html = viewOnboarding(); break;
    case 'pin-setup': html = viewPinSetup(); break;
    case 'pin-lock': html = viewPinLock(); break;
    case 'first-debt': html = viewFirstDebt(); break;
    case 'dashboard': html = viewDashboard(); break;
    case 'add-debt': html = viewAddDebt(); break;
    case 'plan': html = viewPlan(); break;
    case 'settings': html = viewSettings(); break;
    case 'simulator': html = viewSimulator(); break;
    case 'negotiate': html = viewNegotiate(); break;
    case 'report': html = viewReport(); break;
    case 'victory': html = viewVictory(); break;
    default: html = '<div class="screen"></div>';
  }
  app.innerHTML = html + renderModal() + renderPayModal();
  attachEvents();

  // Restaurar foco: si había un input/select con id enfocado antes, devolverle el foco
  // y la posición del cursor. Si no, caer al comportamiento original de autofocus.
  if (focusId) {
    const restored = document.getElementById(focusId);
    if (restored) {
      restored.focus();
      if (selStart != null) {
        try { restored.setSelectionRange(selStart, selEnd); } catch (_) { /* tipo no soporta selección */ }
      }
    }
  } else {
    const firstInput = app.querySelector('input[autofocus]');
    if (firstInput) setTimeout(() => firstInput.focus(), 60);
  }
}

// ============== EVENTS ==============
function attachEvents() {
  document.querySelectorAll('[data-go]').forEach(el => el.addEventListener('click', () => goTo(el.dataset.go)));
  const nb = document.querySelector('[data-onb-next]'); if (nb) nb.addEventListener('click', handleOnbNext);
  const sb = document.querySelector('[data-onb-skip]'); if (sb) sb.addEventListener('click', handleOnbSkip);
  const bb = document.querySelector('[data-onb-back]'); if (bb) bb.addEventListener('click', handleOnbBack);
  document.querySelectorAll('[data-pin-choice]').forEach(el => el.addEventListener('click', () => handlePinChoice(el.dataset.pinChoice)));
  document.querySelectorAll('[data-currency-onb]').forEach(el => el.addEventListener('click', () => handleOnbCurrency(el.dataset.currencyOnb)));
  document.querySelectorAll('[data-currency-pick]').forEach(el => el.addEventListener('click', () => handleDebtCurrencyPick(el.dataset.currencyPick)));
  document.querySelectorAll('[data-pin-key]').forEach(el => el.addEventListener('click', () => handlePinKey(el.dataset.pinKey)));
  const pc = document.querySelector('[data-pin-cancel]'); if (pc) pc.addEventListener('click', handlePinCancel);
  const form = document.getElementById('debt-form'); if (form) form.addEventListener('submit', handleDebtSubmit);
  document.querySelectorAll('[data-edit-debt]').forEach(el => {
    el.addEventListener('click', (e) => {
      // No editar si el click viene de un botón V2 dentro de la tarjeta
      if (e.target.closest('[data-negotiate-debt], .tip-cta, button')) return;
      const d = state.debts.find(x => x.id === el.dataset.editDebt);
      if (d && !d.paidOff) { state.editingDebt = d; goTo('add-debt'); }
    });
  });
  const mp = document.querySelector('[data-mark-paid]'); if (mp) mp.addEventListener('click', () => handleMarkPaid(mp.dataset.markPaid));
  const dd = document.querySelector('[data-delete-debt]'); if (dd) dd.addEventListener('click', () => handleDeleteDebt(dd.dataset.deleteDebt));
  const ts = document.querySelector('[data-toggle-strategy]'); if (ts) ts.addEventListener('click', handleStrategyToggle);
  document.querySelectorAll('[data-setting]').forEach(el => el.addEventListener('click', () => handleSetting(el.dataset.setting)));
  document.querySelectorAll('[data-modal-close]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target === el || el.hasAttribute('data-modal-close')) {
        if (e.target === el) { state.modal = null; render(); }
      }
    });
  });
  const mc = document.querySelector('[data-modal-confirm]'); if (mc) mc.addEventListener('click', handleModalConfirm);
  document.querySelectorAll('[data-modal-option]').forEach(el => el.addEventListener('click', () => handleModalOption(el.dataset.modalOption)));

  // ========== V2 event bindings ==========
  document.querySelectorAll('[data-sim-mode]').forEach(el => el.addEventListener('click', () => handleSimMode(el.dataset.simMode)));
  // Para los inputs del simulador NO llamamos render() — solo updateSimResult().
  // Esto preserva foco, cursor y teclado virtual (crítico en móvil con type="number").
  const simExtraInput = document.getElementById('sim-extra-input');
  if (simExtraInput) simExtraInput.addEventListener('input', (e) => { state.simExtra = parseFloat(e.target.value) || 0; updateSimResult(); });
  const simLumpInput = document.getElementById('sim-lump-input');
  if (simLumpInput) simLumpInput.addEventListener('input', (e) => { state.simLumpAmount = parseFloat(e.target.value) || 0; updateSimResult(); });
  const simLumpTarget = document.getElementById('sim-lump-target');
  if (simLumpTarget) simLumpTarget.addEventListener('change', (e) => { state.simLumpTarget = e.target.value; updateSimResult(); });
  const simRateInput = document.getElementById('sim-rate-input');
  if (simRateInput) simRateInput.addEventListener('input', (e) => { state.simNewRate = parseFloat(e.target.value) || 0; updateSimResult(); });
  const simRateTarget = document.getElementById('sim-rate-target');
  if (simRateTarget) simRateTarget.addEventListener('change', (e) => {
    state.simRateTarget = e.target.value;
    // Al cambiar deuda objetivo, sugerir nueva tasa 5pp abajo de la actual.
    // Requerimos full render aquí porque el valor del input de tasa necesita actualizarse.
    const t = state.debts.find(x => x.id === e.target.value);
    state.simNewRate = t ? Math.max(0, t.rate - 5) : 0;
    render();
  });
  document.querySelectorAll('[data-neg-script]').forEach(el => el.addEventListener('click', () => { state.negScriptId = el.dataset.negScript; render(); }));
  document.querySelectorAll('[data-copy-script]').forEach(el => el.addEventListener('click', () => handleCopyScript(el.dataset.copyScript)));
  document.querySelectorAll('[data-negotiate-debt]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); state.negotiatingDebt = el.dataset.negotiateDebt; state.negScriptId = null; goTo('negotiate'); }));
  document.querySelectorAll('[data-open-negotiate]').forEach(el => el.addEventListener('click', () => { state.negotiatingDebt = el.dataset.openNegotiate; state.negScriptId = null; goTo('negotiate'); }));
  document.querySelectorAll('[data-dismiss-tip]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); dismissTip(el.dataset.dismissTip); }));
  document.querySelectorAll('[data-tip-cta]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    try {
      const cta = JSON.parse(el.dataset.tipCta.replace(/&apos;/g, "'"));
      if (cta.kind === 'simulator') goTo('simulator');
      else if (cta.kind === 'negotiate' && cta.debtId) { state.negotiatingDebt = cta.debtId; goTo('negotiate'); }
      else if (cta.kind === 'setting' && cta.setting) { goTo('settings'); setTimeout(() => handleSetting(cta.setting), 100); }
    } catch (err) { console.error('tip cta', err); }
  }));

  // Reporte: botón "Descargar / imprimir" → abre el diálogo de impresión nativo
  // del navegador. El usuario puede elegir "Guardar como PDF" ahí mismo.
  const pr = document.querySelector('[data-print-report]');
  if (pr) pr.addEventListener('click', handlePrintReport);

  // ========== V3 event bindings (transaccional) ==========
  // Banner de urgencia + botón "Ver todas las opciones"
  document.querySelectorAll('[data-open-pay]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    openPayOptions(el.dataset.openPay);
  }));
  // Botones de pago rápido (mínimo / agresivo) → abren modal con monto preset
  document.querySelectorAll('[data-quick-pay]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    const amt = parseFloat(el.dataset.quickAmount);
    openPayOptions(el.dataset.quickPay, isNaN(amt) ? undefined : amt);
  }));
  // Cerrar modal de pago
  document.querySelectorAll('[data-paymodal-close]').forEach(el => {
    el.addEventListener('click', (e) => {
      // Solo cerrar si el click fue en el backdrop o en el botón explícito
      if (e.target === el || el.tagName === 'BUTTON') { closePayModal(); }
    });
  });
  // Tabs del modal (Pagar / Negociar / Refinanciar)
  document.querySelectorAll('[data-paymode]').forEach(el => el.addEventListener('click', () => handlePayModalMode(el.dataset.paymode)));
  // Slider de monto — NO rerender para preservar UX del slider
  const paySlider = document.getElementById('pay-slider');
  if (paySlider) paySlider.addEventListener('input', (e) => {
    const v = parseFloat(e.target.value) || 0;
    updatePaySliderValue(v);
  });
  // Continuar a confirmación
  const payProceed = document.querySelector('[data-pay-proceed]');
  if (payProceed) payProceed.addEventListener('click', handlePayProceed);
  // Volver desde confirmación
  const payBack = document.querySelector('[data-pay-back]');
  if (payBack) payBack.addEventListener('click', handlePayBack);
  // Ejecutar pago
  const payExec = document.querySelector('[data-pay-execute]');
  if (payExec) payExec.addEventListener('click', handlePayExecute);
  // Desde modal: abrir flujo de negociación existente
  const payNeg = document.querySelector('[data-paymodal-negotiate]');
  if (payNeg) payNeg.addEventListener('click', () => {
    const debtId = payNeg.dataset.paymodalNegotiate;
    closePayModal();
    state.negotiatingDebt = debtId;
    state.negScriptId = null;
    goTo('negotiate');
  });
  // Desde modal: abrir simulador para simular refinanciación
  const payRef = document.querySelector('[data-paymodal-refinance]');
  if (payRef) payRef.addEventListener('click', () => {
    const debtId = payRef.dataset.paymodalRefinance;
    closePayModal();
    state.simMode = 'rate';
    state.simRateTarget = debtId;
    const t = state.debts.find(x => x.id === debtId);
    state.simNewRate = t ? Math.max(0, t.rate - 10) : 0;
    goTo('simulator');
  });
  // Pantalla de victoria → siguiente pago
  const vNext = document.querySelector('[data-victory-next]');
  if (vNext) vNext.addEventListener('click', () => {
    const nextId = vNext.dataset.victoryNext;
    state.lastPayment = null;
    state.view = 'dashboard';
    openPayOptions(nextId);
  });
}

function goTo(view) {
  if (view === 'onboarding') state.onbStep = 0;
  if (view === 'dashboard') state.editingDebt = null;
  if (view === 'add-debt' && !state.editingDebt) state.editingDebt = null;
  // Al salir del formulario de deuda, limpiar el draft y la selección temporal de moneda
  if (view !== 'add-debt' && view !== 'first-debt') {
    state.debtFormDraft = null;
    state.tempDebtCurrency = null;
  }
  state.view = view;
  state.pinError = false;
  render();
  window.scrollTo(0, 0);
}

function handleOnbNext() {
  const input = document.getElementById('onb-input');
  const val = input ? input.value.trim() : '';
  if (state.onbStep === 0) state.profile.name = val;
  else if (state.onbStep === 2) state.profile.income = val ? parseFloat(val) : 0;
  // Paso 1 (moneda) ya se guardó con el click del pill
  state.onbStep++;
  // Al pasar de moneda a ingreso, disparar fetch de tasas en background
  if (state.onbStep === 2) ensureRates().then(() => render());
  render();
}
function handleOnbSkip() { state.onbStep++; render(); }
function handleOnbBack() {
  if (state.onbStep > 0) { state.onbStep--; render(); }
  else { state.view = 'welcome'; render(); }
}

async function handleOnbCurrency(code) {
  state.profile.currency = code;
  await saveAll();
  // Avanzar automáticamente al siguiente paso
  state.onbStep++;
  // Disparar fetch de tasas en background
  ensureRates().then(() => render());
  render();
}

async function handlePinChoice(choice) {
  if (choice === 'yes') {
    state.pinInput = ''; state.pinStage = 'enter'; state.tempPin = ''; state.pinError = false;
    state.view = 'pin-setup'; render();
  } else {
    if (!state.profile.createdAt) state.profile.createdAt = Date.now();
    await saveAll();
    state.view = 'first-debt'; render();
  }
}

function handlePinCancel() {
  state.pinInput = ''; state.pinStage = 'enter'; state.tempPin = ''; state.pinError = false;
  if (!state.profile.createdAt) { state.view = 'onboarding'; state.onbStep = 3; }
  else state.view = 'settings';
  render();
}

async function handlePinKey(key) {
  state.pinError = false;
  if (state.view === 'pin-setup') {
    if (key === 'del') { state.pinInput = state.pinInput.slice(0, -1); render(); return; }
    if (state.pinInput.length < 4) {
      state.pinInput += key;
      render();
      if (state.pinInput.length === 4) {
        setTimeout(async () => {
          if (state.pinStage === 'enter') {
            state.tempPin = state.pinInput; state.pinInput = ''; state.pinStage = 'confirm'; render();
          } else {
            if (state.pinInput === state.tempPin) {
              state.profile.pin = state.tempPin;
              if (!state.profile.createdAt) state.profile.createdAt = Date.now();
              state.unlocked = true;
              await saveAll();
              state.pinInput = ''; state.tempPin = ''; state.pinStage = 'enter';
              state.view = state.debts.length === 0 ? 'first-debt' : 'settings';
              render();
            } else {
              state.pinError = true; state.pinInput = ''; state.tempPin = ''; state.pinStage = 'enter';
              render();
              setTimeout(() => { state.pinError = false; render(); }, 1600);
            }
          }
        }, 180);
      }
    }
  } else if (state.view === 'pin-lock') {
    if (key === 'del') { state.pinInput = state.pinInput.slice(0, -1); render(); return; }
    if (state.pinInput.length < 4) {
      state.pinInput += key;
      render();
      if (state.pinInput.length === 4) {
        setTimeout(() => {
          if (state.pinInput === state.profile.pin) {
            state.unlocked = true; state.pinInput = ''; state.view = 'dashboard'; render();
          } else {
            state.pinError = true; state.pinInput = '';
            render();
            setTimeout(() => { state.pinError = false; render(); }, 1600);
          }
        }, 180);
      }
    }
  }
}

async function handleDebtSubmit(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const currency = fd.get('currency') || state.profile.currency;
  const data = {
    creditor: (fd.get('creditor') || '').trim(),
    category: fd.get('category') || 'other',
    balance: parseFloat(fd.get('balance')) || 0,
    rate: parseFloat(fd.get('rate')) || 0,
    minPayment: parseFloat(fd.get('minPayment')) || 0,
    dueDay: parseInt(fd.get('dueDay')) || 1,
    currency: currency
  };
  if (state.editingDebt) {
    // Proteger initialBalance: si el usuario edita y el nuevo balance SUPERA el initial
    // (típicamente porque corrige un error de entrada), actualizamos initial.
    // Si el balance BAJA (pagó algo), initial se queda igual para que el tracking funcione.
    const currentInitial = state.editingDebt.initialBalance || state.editingDebt.balance || 0;
    if (data.balance > currentInitial) {
      data.initialBalance = data.balance;
    }
    Object.assign(state.editingDebt, data);
  } else {
    state.debts.push({
      id: uid(),
      ...data,
      initialBalance: data.balance,
      createdAt: Date.now(),
      paidOff: false
    });
  }
  await saveAll();
  state.editingDebt = null;
  state.tempDebtCurrency = null;
  state.debtFormDraft = null;
  // Si hay deudas en moneda extranjera, intentar refrescar tasas
  if (hasMixedCurrencies()) ensureRates();
  state.view = 'dashboard';
  render();
  // Check milestones después del render — si hay un hito nuevo (ej: usuario reportó
  // un pago que bajó el balance), aparece la milestone-card sobre el dashboard.
  setTimeout(() => checkMilestones(), 200);
}

function handleDebtCurrencyPick(code) {
  // Antes del re-render, capturar los valores que el usuario ya escribió en el formulario.
  // Sin esto, cambiar de moneda borraría campos como "¿A quién le debes?", saldo, tasa, etc.
  captureDebtFormState();
  if (state.editingDebt) {
    state.editingDebt.currency = code;
  } else {
    state.tempDebtCurrency = code;
  }
  // Si eligió moneda distinta a la principal, asegurar tasas
  if (code !== state.profile.currency) ensureRates();
  render();
}

// Lee los valores actuales del formulario y los guarda en state antes de un re-render
// que destruiría el DOM. Para deudas nuevas, lo guarda en state.debtFormDraft.
// Para edición, actualiza el objeto editingDebt directamente.
function captureDebtFormState() {
  const form = document.getElementById('debt-form');
  if (!form) return;
  const fd = new FormData(form);
  const creditor = (fd.get('creditor') || '').trim();
  const category = fd.get('category') || 'other';
  const balanceRaw = fd.get('balance') || '';
  const rateRaw = fd.get('rate') || '';
  const minPayRaw = fd.get('minPayment') || '';
  const dueDayRaw = fd.get('dueDay') || '';

  if (state.editingDebt) {
    // Mutar el objeto que está siendo editado con lo que el usuario ya escribió
    if (creditor) state.editingDebt.creditor = creditor;
    state.editingDebt.category = category;
    const balNum = parseFloat(balanceRaw);
    if (!isNaN(balNum)) state.editingDebt.balance = balNum;
    const rNum = parseFloat(rateRaw);
    if (!isNaN(rNum)) state.editingDebt.rate = rNum;
    const mNum = parseFloat(minPayRaw);
    if (!isNaN(mNum)) state.editingDebt.minPayment = mNum;
    const dNum = parseInt(dueDayRaw);
    if (!isNaN(dNum)) state.editingDebt.dueDay = dNum;
  } else {
    // Deuda nueva: guardar en un draft
    state.debtFormDraft = {
      creditor,
      category,
      balance: balanceRaw,
      rate: rateRaw,
      minPayment: minPayRaw,
      dueDay: dueDayRaw
    };
  }
}

async function handleMarkPaid(id) {
  state.modal = {
    title: 'Cerrar esta deuda',
    body: '¿Ya la pagaste por completo? Queda archivada como cerrada.',
    confirmText: 'Sí, está cerrada',
    onConfirm: async () => {
      const d = state.debts.find(x => x.id === id);
      if (d) { d.paidOff = true; d.paidOffAt = Date.now(); d.balance = 0; }
      await saveAll();

      // Volver al dashboard para que lo que venga (milestone o modal) se vea sobre él
      state.editingDebt = null;
      state.view = 'dashboard';

      // Si cerrar esta deuda destapa un hito nuevo, celebramos el hito (más
      // emocional y específico). Si no, mostramos el modal genérico de "una menos".
      const earned = earnedMilestones();
      const unlocked = state.profile.unlockedMilestones || [];
      const newOnes = earned.filter(mid => !unlocked.includes(mid));

      if (newOnes.length > 0) {
        state.modal = null;
        render();
        setTimeout(() => checkMilestones(), 250);
      } else {
        const remaining = active().length;
        state.modal = {
          title: 'Una deuda menos',
          body: remaining === 0
            ? 'Las cerraste todas. Eso no es poca cosa. Respira.'
            : `Eso es real. Quedan ${remaining} ${remaining === 1 ? 'deuda' : 'deudas'}. El camino sigue.`,
          confirmText: 'Continuar',
          singleAction: true,
          onConfirm: () => { state.modal = null; render(); }
        };
        render();
      }
    }
  };
  render();
}

async function handleDeleteDebt(id) {
  state.modal = {

    body: 'La borra por completo del registro. Usa "Ya la pagué" si la cerraste — así se preserva el progreso.',
    confirmText: 'Eliminar',
    danger: true,
    onConfirm: async () => {
      state.debts = state.debts.filter(d => d.id !== id);

}

// =====================================================
// ============== V3 — LÓGICA TRANSACCIONAL ==============
// =====================================================

// Día del mes actual → usado para calcular días hasta el próximo vencimiento
function daysUntilDue(dueDay) {
  const now = new Date();
  const today = now.getDate();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  if (dueDay >= today) return dueDay - today;
  // Ya pasó este mes → siguiente mes
  return (daysInMonth - today) + Math.min(dueDay, 31);
}

// Identifica la deuda más urgente (vence en <= 7 días, con interés mensual alto)
// Retorna null si no hay nada urgente → no mostramos banner
function getCriticalUpcoming() {
  const a = active();
  if (a.length === 0) return null;
  const scored = a.map(d => {
    const days = daysUntilDue(d.dueDay || 1);
    const monthlyInt = balanceInPrimary(d) * (d.rate / 100 / 12);
    return { debt: d, days, monthlyInt };
  });
  // Priorizar por proximidad de vencimiento (<=7 días) y magnitud de intereses
  scored.sort((a, b) => {
    if (a.days !== b.days) return a.days - b.days;
    return b.monthlyInt - a.monthlyInt;
  });
  const top = scored[0];
  // Criterio: mostrar banner si hay algo en <=7 días O si hay alguna deuda con interés mensual > $50k COP equiv
  if (top.days <= 7) return top;
  // Fallback: si la deuda con mayor interés mensual cuesta >3% del balance al mes, mostrar banner "sangrado constante"
  const bleeding = scored.find(x => x.monthlyInt > 0 && (x.monthlyInt / balanceInPrimary(x.debt)) >= 0.025);
  return bleeding || null;
}

// Calcula sugerencias de pago para una deuda (en su moneda nativa)
// - minimum: cuota mínima o 5% del balance (lo que sea mayor, mínimo >0)
// - aggressive: aprox. 3x la mínima, cap a ~30% del balance para no ser absurdo
function suggestedPayments(d) {
  const ccy = debtCcy(d);
  const meta = currencyMeta(ccy);
  const balance = d.balance;
  const minFromDebt = d.minPayment || 0;
  const minFromBalance = balance * 0.05;
  let minimum = Math.max(minFromDebt, minFromBalance);
  // Redondeo amigable según decimales de la moneda
  minimum = meta.decimals === 0 ? Math.ceil(minimum / 1000) * 1000 : Math.ceil(minimum * 100) / 100;
  minimum = Math.min(minimum, balance);

  let aggressive = minimum * 3;
  aggressive = Math.min(aggressive, balance * 0.3, balance);
  aggressive = meta.decimals === 0 ? Math.ceil(aggressive / 1000) * 1000 : Math.ceil(aggressive * 100) / 100;
  // Si agresivo ≤ mínimo (deuda muy pequeña), ajustar
  if (aggressive <= minimum) aggressive = Math.min(balance, minimum * 2);
  return { minimum, aggressive, currency: ccy };
}

// Calcula el impacto de un pago: cuánto ahorra en intereses + nuevo balance
function calculatePayImpact(debt, amount) {
  const ccy = debtCcy(debt);
  const newBalance = Math.max(0, debt.balance - amount);
  const monthlyRate = debt.rate / 100 / 12;
  // Ahorro aproximado en intereses del primer mes (lo inmediato y tangible)
  const interestSavedMonth1 = amount * monthlyRate;
  // Proyección: cuánto ahorraría en 12 meses si mantiene este ritmo de balance reducido
  const interestSaved12mo = interestSavedMonth1 * 12;
  // Días de "paz" estimados: amount / monthlyInterestOnBalance
  const monthlyIntOnBalance = debt.balance * monthlyRate;
  const daysOfPeace = monthlyIntOnBalance > 0 ? Math.round((amount / monthlyIntOnBalance) * 30) : 30;
  return {
    newBalance,
    interestSavedMonth1,
    interestSaved12mo,
    daysOfPeace: Math.max(7, Math.min(365, daysOfPeace)),
    currency: ccy
  };
}

// Abre el modal de opciones de pago para una deuda específica
function openPayOptions(debtId, presetAmount) {
  const d = state.debts.find(x => x.id === debtId);
  if (!d || d.paidOff) return;
  const sugg = suggestedPayments(d);
  state.payModal = {
    debtId,
    mode: 'pay',              // 'pay' | 'negotiate' | 'refinance'
    amount: presetAmount != null ? presetAmount : sugg.minimum,
    step: 'options'            // 'options' → 'confirm'
  };
  render();
}

function closePayModal() {
  state.payModal = null;
  render();
}

// Render del modal de opciones (Sprint 1)
function renderPayModal() {
  if (!state.payModal) return '';
  const pm = state.payModal;
  const d = state.debts.find(x => x.id === pm.debtId);
  if (!d) return '';

  if (pm.step === 'confirm') return renderPayConfirmModal(d, pm.amount);

  const sugg = suggestedPayments(d);
  const ccy = debtCcy(d);
  const impact = calculatePayImpact(d, pm.amount);
  const mode = pm.mode || 'pay';

  return `
    <div class="pay-modal-backdrop" data-paymodal-close>
      <div class="pay-modal" onclick="event.stopPropagation()">
        <div class="pay-modal-handle"></div>
        <div class="pay-modal-head">
          <div>
            <div class="pay-modal-title">${esc(d.creditor)}</div>
            <div class="pay-modal-sub">Saldo actual: ${fmt(d.balance, ccy)} · Tasa ${d.rate}%</div>
          </div>
          <button class="pay-modal-close" data-paymodal-close aria-label="Cerrar">×</button>
        </div>

        <div class="pay-options-tabs" role="tablist">
          <button class="pay-tab ${mode === 'pay' ? 'active' : ''}" data-paymode="pay">Pagar ahora</button>
          <button class="pay-tab ${mode === 'negotiate' ? 'active' : ''}" data-paymode="negotiate">Negociar</button>
          <button class="pay-tab ${mode === 'refinance' ? 'active' : ''}" data-paymode="refinance">Refinanciar</button>
        </div>

        ${mode === 'pay' ? renderPayModeContent(d, pm.amount, sugg, impact, ccy) : ''}
        ${mode === 'negotiate' ? renderNegotiateModeContent(d) : ''}
        ${mode === 'refinance' ? renderRefinanceModeContent(d) : ''}
      </div>
    </div>
  `;
}

function renderPayModeContent(d, amount, sugg, impact, ccy) {
  const max = d.balance;
  // Ticks inteligentes para el slider
  const tick1 = sugg.minimum;
  const tick2 = sugg.aggressive;
  const tick3 = max;

  return `
    <div class="pay-amount-card">
      <div class="pay-amount-label">Vas a pagar</div>
      <div class="pay-amount-big" id="pay-amount-display">${fmt(amount, ccy)}</div>
      <div class="pay-amount-hint">Ajusta deslizando abajo</div>

      <div class="pay-slider-wrap">
        <input type="range" class="pay-slider" id="pay-slider"
               min="${Math.max(1, Math.floor(sugg.minimum * 0.5))}"
               max="${max}"
               step="${currencyMeta(ccy).decimals === 0 ? 1000 : 1}"
               value="${amount}">
        <div class="pay-slider-ticks">
          <span>Mín ${fmt(tick1, ccy)}</span>
          <span>Agresivo ${fmt(tick2, ccy)}</span>
          <span>Todo ${fmt(tick3, ccy)}</span>
        </div>
      </div>
    </div>

    <div class="pay-impact" id="pay-impact">
      Con este pago, tu saldo bajará a <strong>${fmt(impact.newBalance, ccy)}</strong>.
      <div class="pay-impact-grid">

// Ejecuta el pago: descuenta del balance, registra en estado, navega a victoria
async function handlePayExecute() {
  if (!state.payModal) return;
  const pm = state.payModal;
  const d = state.debts.find(x => x.id === pm.debtId);
  if (!d) { closePayModal(); return; }

  const amountPaid = Math.min(pm.amount, d.balance);
  const ccy = debtCcy(d);
  const balanceBefore = d.balance;
  const newBalance = Math.max(0, d.balance - amountPaid);

  // Actualizar deuda
  d.balance = newBalance;
  if (newBalance <= 0) {
    d.paidOff = true;
    d.paidOffAt = Date.now();
  }

  // Registro histórico de pagos (para tracking + métricas)
  // Se guarda dentro de state.profile → persiste vía saveAll()
  if (!Array.isArray(state.profile.paymentHistory)) state.profile.paymentHistory = [];
  state.profile.paymentHistory.push({
    id: uid(),
    debtId: d.id,
    creditor: d.creditor,
    amount: amountPaid,
    currency: ccy,
    balanceBefore,
    balanceAfter: newBalance,
    timestamp: Date.now()
  });

  // Cerrar modal + navegar a victoria
  state.lastPayment = {
    debtId: d.id,
    creditor: d.creditor,
    amount: amountPaid,
    currency: ccy,
    balanceBefore,
    balanceAfter: newBalance,
    paidOff: d.paidOff === true
  };
  state.payModal = null;
  state.view = 'victory';
  await saveAll();
  render();
  window.scrollTo(0, 0);
}

// Pantalla de Victoria (Sprint 2)
function viewVictory() {
  const lp = state.lastPayment;
  if (!lp) { state.view = 'dashboard'; return viewDashboard(); }

  const d = state.debts.find(x => x.id === lp.debtId);
  const impact = d ? calculatePayImpact({ balance: lp.balanceBefore, rate: d.rate }, lp.amount) : null;
  const daysOfPeace = impact ? impact.daysOfPeace : 30;
  const saved12 = impact ? impact.interestSaved12mo : 0;

  // Próximo pago recomendado
  const a = active();
  const next = a.length > 0 ? priorityDebt() || a[0] : null;
  const nextSugg = next ? suggestedPayments(next) : null;

  const celebration = lp.paidOff
    ? 'Una deuda cerrada. Eso es real.'
    : `${fmt(lp.amount, lp.currency)} menos en tu deuda.`;

  const bodyText = lp.paidOff
    ? `Acabas de cerrar tu deuda con ${esc(lp.creditor)}. Respira. No es poca cosa.`
    : `Tu pago a ${esc(lp.creditor)} quedó registrado. Te compra ${daysOfPeace} días de tranquilidad antes del próximo ciclo de intereses.`;

  return `
    <div class="victory-screen fade-in">
      <div class="victory-celebration">
        <div class="victory-check">✓</div>
      </div>

      <div class="victory-eyebrow">Pago registrado</div>
      <div class="victory-title">${celebration}</div>
      ${!lp.paidOff ? `<div class="victory-amount">${fmt(lp.amount, lp.currency)}</div>` : ''}
      <div class="victory-body">${bodyText}</div>

      ${!lp.paidOff && impact ? `
        <div class="victory-stats">
          <div class="victory-stat">
            <span class="label">Nuevo saldo</span>
            <span class="val">${fmt(lp.balanceAfter, lp.currency)}</span>
          </div>
          <div class="victory-stat">
            <span class="label">Ahorro 12 meses</span>
            <span class="val" style="color: var(--sage-deep);">${fmt(saved12, lp.currency)}</span>
          </div>
        </div>
      ` : ''}

      ${next && next.id !== lp.debtId && nextSugg ? `
        <div class="victory-next">
          <div class="victory-next-label">Próximo movimiento recomendado</div>
          <div class="victory-next-body">
            <strong>${esc(next.creditor)}</strong> — pago mínimo sugerido de <strong>${fmt(nextSugg.minimum, debtCcy(next))}</strong>.
            Es la deuda con mayor impacto pendiente.
          </div>
        </div>
      ` : ''}

      <div class="victory-actions">
        ${next && nextSugg && next.id !== lp.debtId ? `
          <button class="victory-primary" data-victory-next="${next.id}">Pagar siguiente: ${esc(next.creditor)}</button>
        ` : ''}
        <button class="${next && nextSugg && next.id !== lp.debtId ? 'victory-secondary' : 'victory-primary'}" data-go="dashboard">
          Volver al panel
        </button>
      </div>
    </div>
  `;
}

// Helpers para inyectar el banner + quick actions en el dashboard
function renderUrgencyBanner() {
  const crit = getCriticalUpcoming();
  if (!crit) return '';
  const { debt, days, monthlyInt } = crit;
  const ccy = debtCcy(debt);

  let title, body;
  if (days <= 7) {
    title = days === 0
      ? `Pago crítico HOY · ${esc(debt.creditor)}`
      : days === 1
        ? `Pago crítico mañana · ${esc(debt.creditor)}`
        : `Pago crítico en ${days} días · ${esc(debt.creditor)}`;
    body = `Si no pagas ahora, se agregarán <strong>${fmt(monthlyInt, ccy)}</strong> en intereses el próximo mes. Actuar hoy te ahorra ese dinero.`;
  } else {
    title = `${esc(debt.creditor)} te está sangrando`;
    body = `Esta deuda te cuesta <strong>${fmt(monthlyInt, ccy)}/mes</strong> solo en intereses. Cada mes que pasa sin pagar, se va ese dinero.`;
  }

  return `
    <div class="urgency-banner">
      <div class="urgency-head">
        <span class="urgency-dot"></span>
        <span>Atención</span>
      </div>
      <div class="urgency-title">${title}</div>
      <div class="urgency-body">${body}</div>
      <button class="urgency-cta" data-open-pay="${debt.id}">
        Actuar ahora →
      </button>
    </div>
  `;
}

function renderQuickActions() {
  const crit = getCriticalUpcoming();

        <div class="qa-label">Pago agresivo</div>

        <span class="qa-full-label">Ver todas las opciones · ajustar monto, negociar, refinanciar</span>
        <span class="qa-full-arrow">→</span>
      </button>
    </div>
  `;
}

// ============== V2 HANDLERS ==============
function handleSimMode(mode) {
  state.simMode = mode;
  // Reset inputs al cambiar de modo para evitar arrastrar valores
  if (mode === 'extra') state.simExtra = state.simExtra || 0;
  if (mode === 'lumpSum') {
    state.simLumpAmount = state.simLumpAmount || 0;
    if (!state.simLumpTarget) {
      const p = priorityDebt();
      state.simLumpTarget = p ? p.id : (active()[0] && active()[0].id);
    }
  }
  if (mode === 'rate') {
    if (!state.simRateTarget) {
      const p = priorityDebt();
      state.simRateTarget = p ? p.id : (active()[0] && active()[0].id);
    }
    if (state.simNewRate === undefined) {
      const t = state.debts.find(x => x.id === state.simRateTarget);
      state.simNewRate = t ? Math.max(0, t.rate - 5) : 0;
    }
  }
  render();
}

async function handleCopyScript(scriptId) {
  const d = state.debts.find(x => x.id === state.negotiatingDebt);
  if (!d) return;
  const scripts = generateScripts(d);
  const s = scripts.find(x => x.id === scriptId);
  if (!s) return;
  try {
    await navigator.clipboard.writeText(s.body);
    showToast('Guion copiado al portapapeles');
  } catch (e) {
    // Fallback para navegadores sin clipboard API
    const ta = document.createElement('textarea');
    ta.value = s.body;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('Guion copiado'); } catch (_) { showToast('No se pudo copiar — copia manual'); }
    document.body.removeChild(ta);
  }
}

function handlePrintReport() {
  // Guardar el título original para restaurarlo después de imprimir.
  // El título es lo que aparece como nombre sugerido cuando el usuario elige
  // "Guardar como PDF" en el diálogo — queremos algo útil como "ORDENI_juan_2026-04-19".
  const prevTitle = document.title;
  const name = state.profile.name || 'reporte';
  const dateStr = new Date().toISOString().slice(0, 10);
  document.title = `ORDENI_${name.replace(/[^a-z0-9]/gi, '_')}_${dateStr}`;
  window.print();
  // Restaurar tras el print (window.print es sincrónico en la mayoría de browsers)
  setTimeout(() => { document.title = prevTitle; }, 500);
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ============== INIT ==============
async function init() {
  await loadAll();

  // Silent initialization de milestones:
  // Si el usuario ya tiene cuenta pero nunca se le setearon unlockedMilestones
  // (viene de una versión anterior del app), marcamos silenciosamente los hitos
  // que ya había cruzado. Así la próxima vez sólo se celebran los NUEVOS.
  if (state.profile.createdAt && !state.profile.unlockedMilestones) {
    state.profile.unlockedMilestones = earnedMilestones();
    await saveAll();
  }

  // Disparar fetch de tasas en background (no bloquea render inicial)
  if (state.profile.createdAt) {
    ensureRates().then((ok) => {
      if (ok && hasMixedCurrencies()) render();
    });
  }
  if (!state.profile.createdAt) state.view = 'welcome';
  else if (state.profile.pin) state.view = 'pin-lock';
  else { state.unlocked = true; state.view = 'dashboard'; }
  render();
}

// Keyboard for PIN
document.addEventListener('keydown', (e) => {
  if (state.view !== 'pin-setup' && state.view !== 'pin-lock') return;
  if (/^[0-9]$/.test(e.key)) { handlePinKey(e.key); e.preventDefault(); }
  else if (e.key === 'Backspace') { handlePinKey('del'); e.preventDefault(); }
});

init();
</script>
