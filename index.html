<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Deuda en Silencio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ====== PALETA CÁLIDA Y HUMANA ====== */
  /* Bases */
  --paper: #f7f1e6;          /* crema cálida (fondo de app) */
  --paper-deep: #efe6d4;     /* crema más saturada */
  --card: #ffffff;           /* blanco limpio para cards principales */
  --card-warm: #fdf9f1;      /* blanco con tinte cálido */

  /* Tinta (texto) — marrón oscuro cálido, no negro puro */
  --ink: #2b2420;
  --ink-soft: #3d342e;
  --ash: #4a403a;
  --muted: #8b7f73;

  /* Acentos cálidos */
  --accent: #c87656;         /* terracota (reemplaza al dorado) */
  --accent-deep: #a4583c;    /* terracota profunda (hover/énfasis) */
  --accent-soft: #f0d9cc;    /* terracota translúcida (fondos suaves) */

  /* Verde salvia para confianza / éxito */
  --sage: #7a9278;
  --sage-deep: #5a7c5f;
  --sage-soft: #e4ebe2;

  /* Estados */
  --red: #b85a47;            /* rojo quemado cálido (no rojo puro agresivo) */
  --red-soft: #f4dfd8;
  --green: #5a7c5f;          /* igual que sage-deep, para consistencia */

  /* Bordes */
  --border: #e8dfd0;
  --border-soft: #f0e8d6;

  /* Sombras suaves */
  --shadow-sm: 0 1px 2px rgba(43,36,32,0.04), 0 2px 8px rgba(43,36,32,0.03);
  --shadow-md: 0 2px 4px rgba(43,36,32,0.05), 0 8px 24px rgba(43,36,32,0.06);
  --shadow-lg: 0 8px 32px rgba(43,36,32,0.08);
  --shadow-modal: 0 20px 60px rgba(43,36,32,0.22);

  /* Radios */
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 24px;
  --r-pill: 100px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  font-weight: 400;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; }

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--paper);
  position: relative;
  overflow-x: hidden;
  box-shadow: 0 0 40px rgba(43,36,32,0.06);
}
.screen { padding: 40px 28px 80px; min-height: 100vh; }

h1, h2, h3 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  letter-spacing: -0.015em;
  font-optical-sizing: auto;
}

.eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent-deep);
  display: block;
}
.mono { font-family: 'DM Mono', monospace; }

/* ============================================================ */
/* WELCOME — ahora claro y acogedor, no oscuro y editorial       */
/* ============================================================ */
.welcome {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 72px 32px 40px;
  background:
    radial-gradient(circle at 85% 15%, var(--accent-soft) 0%, transparent 55%),
    radial-gradient(circle at 15% 85%, var(--sage-soft) 0%, transparent 50%),
    var(--paper);
  color: var(--ink);
  position: relative;
  overflow: hidden;
}
.welcome::before { display: none; } /* quitamos el patrón editorial rayado */
.welcome-inner { position: relative; z-index: 1; }
.welcome-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.28em;
  color: var(--accent-deep);
  text-transform: uppercase;
  margin-bottom: 40px;
  font-weight: 500;
}
.welcome h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 52px;
  font-weight: 500;
  line-height: 1.05;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}
.welcome h1 em {
  font-style: italic;
  color: var(--accent-deep);
  font-weight: 400;
}
.welcome-body {
  font-size: 16px;
  color: var(--ash);
  margin-top: 28px;
  line-height: 1.75;
  max-width: 340px;
}
.welcome-cta {
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 18px 32px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  border-radius: var(--r-pill);
  width: 100%;
  margin-top: 32px;
  transition: all 0.25s ease;
  box-shadow: var(--shadow-sm);
}
.welcome-cta:hover {
  background: var(--accent-deep);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.welcome-footer {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--muted);
  text-transform: uppercase;
  position: relative;
  z-index: 1;
  text-align: center;
  opacity: 0.7;
}

/* ============================================================ */
/* ONBOARDING / FORMS                                            */
/* ============================================================ */
.nav-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 36px;
}
.back-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--ink);
  width: 38px;
  height: 38px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
  box-shadow: var(--shadow-sm);
}
.back-btn:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  transform: translateX(-2px);
}
.progress { display: flex; gap: 6px; flex: 1; }
.progress-step {
  height: 4px;
  flex: 1;
  background: var(--border);
  border-radius: var(--r-pill);
  transition: background 0.3s ease;
}
.progress-step.active { background: var(--accent); }
.progress-step.done { background: var(--sage); }

.form-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 32px;
  font-weight: 500;
  line-height: 1.15;
  margin-bottom: 12px;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.form-subtitle {
  font-size: 15px;
  color: var(--ash);
  margin-bottom: 36px;
  line-height: 1.7;
}

.field { margin-bottom: 22px; }
.field-label {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0;
  color: var(--ink);
  text-transform: none;
  margin-bottom: 8px;
  display: block;
}
.field-input {
  width: 100%;
  background: var(--card);
  border: 1.5px solid var(--border);
  padding: 15px 18px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: var(--ink);
  border-radius: var(--r-md);
  transition: all 0.2s ease;
  -webkit-appearance: none;
  appearance: none;
}
.field-input::placeholder { color: var(--muted); opacity: 0.7; }
.field-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft);
}
.field-hint {
  font-size: 13px;
  color: var(--muted);
  margin-top: 7px;
  line-height: 1.55;
}

.field-select {
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath d='M1 1l5 5 5-5' stroke='%238b7f73' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 18px center;
  padding-right: 44px;
  cursor: pointer;
}

/* Category pill (en tarjeta de deuda) */
.category-pill {
  display: inline-block;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: var(--accent-deep);
  background: var(--accent-soft);
  padding: 3px 10px;
  border-radius: var(--r-pill);
  margin-left: 8px;
  vertical-align: middle;
}
.debt-card.paid .category-pill {
  opacity: 0.5;
  background: var(--border-soft);
  color: var(--muted);
}

/* Category breakdown (dashboard) */
.breakdown-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 22px 24px;
  margin-bottom: 28px;
  box-shadow: var(--shadow-sm);
}
.breakdown-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 11px 0;
  border-bottom: 1px solid var(--border-soft);
}
.breakdown-row:last-child { border-bottom: none; }
.breakdown-label {
  flex-shrink: 0;
  min-width: 100px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: var(--ash);
}
.breakdown-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--border-soft);
  border-radius: var(--r-pill);
  overflow: hidden;
}
.breakdown-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-deep) 100%);
  border-radius: var(--r-pill);
}
.breakdown-amount {
  flex-shrink: 0;
  font-size: 13px;
  color: var(--ink);
  font-weight: 600;
  min-width: 90px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ============================================================ */
/* V2: Simulator                                                 */
/* ============================================================ */
.sim-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  padding: 4px;
  border-radius: var(--r-pill);
  background: var(--paper-deep);
}
.sim-tab {
  flex: 1;
  padding: 11px 10px;
  background: transparent;
  border: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: var(--r-pill);
}
.sim-tab:hover { color: var(--ink); }
.sim-tab.active {
  background: var(--card);
  color: var(--ink);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}
.sim-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.sim-result {
  background: var(--ink);
  color: var(--paper);
  padding: 24px 22px;
  border-radius: var(--r-lg);
  margin-bottom: 4px;
  box-shadow: var(--shadow-md);
}
.sim-result.error {
  background: var(--red-soft);
  border: 1px solid rgba(184,90,71,0.3);
  color: var(--ink);
  box-shadow: none;
}
.sim-result-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.sim-result-body {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
}
.sim-result.error .sim-result-title { color: var(--red); }
.sim-result.error .sim-result-body { color: var(--ash); }
.sim-delta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}
.sim-delta { text-align: left; }
.sim-delta-label {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: rgba(247,241,230,0.55);
  margin-bottom: 8px;
}
.sim-delta-val {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 24px;
  font-weight: 500;
  line-height: 1.1;
  color: var(--paper);
  letter-spacing: -0.015em;
}
.sim-delta-val.positive { color: var(--accent); }
.sim-delta-sub {
  font-size: 11px;
  color: rgba(247,241,230,0.4);
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin-top: 4px;
}
.sim-note {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(247,241,230,0.12);
  font-size: 12px;
  color: rgba(247,241,230,0.55);
}

/* ============================================================ */
/* V2: Negotiation scripts                                       */
/* ============================================================ */
.script-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 20px;
  scrollbar-width: none;
}
.script-tabs::-webkit-scrollbar { display: none; }
.script-tab {
  flex-shrink: 0;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--r-pill);
  padding: 10px 18px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ash);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s ease;
}
.script-tab:hover { color: var(--ink); border-color: var(--ink); }
.script-tab.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.script-when {
  font-size: 14px;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 18px;
  line-height: 1.65;
  font-family: 'Fraunces', Georgia, serif;
}
.script-body {
  background: var(--card-warm);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--r-md);
  padding: 24px 26px;
  font-size: 14.5px;
  line-height: 1.85;
  color: var(--ash);
  margin-bottom: 14px;
  white-space: normal;
  box-shadow: var(--shadow-sm);
}
.script-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}
.script-tips {
  background: var(--sage-soft);
  border-radius: var(--r-md);
  padding: 20px 22px;
  margin-bottom: 16px;
}
.script-tips-head {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
  color: var(--sage-deep);
  margin-bottom: 12px;
}
.script-tips ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.script-tips li {
  font-size: 14px;
  color: var(--ash);
  line-height: 1.7;
  padding: 6px 0 6px 20px;
  position: relative;
}
.script-tips li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 14px;
  width: 8px;
  height: 2px;
  background: var(--sage-deep);
  border-radius: 1px;
}
.script-disclaimer {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  text-align: center;
  line-height: 1.6;
}

/* ============================================================ */
/* V2: Tips contextuales                                         */
/* ============================================================ */
.tip-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--r-md);
  padding: 18px 22px;
  margin-bottom: 12px;
  position: relative;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s ease;
}
.tip-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.tip-card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.tip-card-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 17px;
  font-weight: 500;
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.tip-card-body {
  font-size: 14px;
  color: var(--ash);
  line-height: 1.7;
  margin-bottom: 10px;
}
.tip-dismiss {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  padding: 2px 8px;
  opacity: 0.5;
  transition: opacity 0.15s;
  flex-shrink: 0;
  border-radius: 50%;
}
.tip-dismiss:hover { opacity: 1; background: var(--paper-deep); }
.tip-cta {
  background: transparent;
  border: none;
  padding: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
  color: var(--accent-deep);
  cursor: pointer;
  text-decoration: none;
  transition: color 0.15s;
}
.tip-cta:hover { color: var(--ink); }

/* ============================================================ */
/* V2: Enhanced strategy card                                    */
/* ============================================================ */
.strategy-why {
  font-size: 13.5px;
  color: var(--ash);
  line-height: 1.75;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--border);
}
.strategy-why strong { color: var(--ink); font-weight: 600; }

/* ============================================================ */
/* V2: Copy toast                                                */
/* ============================================================ */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--paper);
  padding: 14px 24px;
  border-radius: var(--r-pill);
  font-size: 13.5px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 200;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ============================================================ */
/* BOTONES                                                       */
/* ============================================================ */
.btn {
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 16px 26px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0;
  cursor: pointer;
  border-radius: var(--r-pill);
  width: 100%;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}
.btn:hover:not(:disabled) {
  background: var(--accent-deep);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: var(--card);
  color: var(--ink);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--card);
  border-color: var(--ink);
  color: var(--ink);
}
.btn-danger {
  background: var(--red);
}
.btn-danger:hover:not(:disabled) {
  background: #a04c3c;
}
.btn-ghost {
  background: none;
  color: var(--muted);
  border: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  padding: 14px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 4px;
  text-decoration-color: var(--border);
  width: 100%;
  box-shadow: none;
  border-radius: var(--r-pill);
}
.btn-ghost:hover { color: var(--ink); text-decoration-color: var(--accent); }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }
.stack > * + * { margin-top: 10px; }

/* ============================================================ */
/* PIN                                                           */
/* ============================================================ */
.pin-display {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin: 48px 0 40px;
}
.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid var(--ink);
  background: transparent;
  transition: all 0.15s ease;
}
.pin-dot.filled {
  background: var(--ink);
  transform: scale(1.15);
}
.pin-dot.error {
  border-color: var(--red);
  background: var(--red);
  animation: shake 0.4s;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  max-width: 280px;
  margin: 0 auto;
}
.pin-key {
  background: var(--card);
  border: 1px solid var(--border);
  height: 62px;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 24px;
  font-weight: 500;
  cursor: pointer;
  border-radius: var(--r-md);
  transition: all 0.12s ease;
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.pin-key:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  transform: translateY(-1px);
}
.pin-key:active { transform: scale(0.96); }
.pin-key.fn {

async function fetchRates() {
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    if (!res.ok) throw new Error('http ' + res.status);
    const data = await res.json();
    if (data.result !== 'success' || !data.rates) throw new Error('bad payload');
    state.profile.rates = data.rates;
    state.profile.ratesUpdated = Date.now();
    state.profile.ratesError = false;
    await saveAll();
    return true;
  } catch (e) {
    console.warn('rates fetch failed', e);
    state.profile.ratesError = true;
    try { await saveAll(); } catch(_) {}
    return false;
  }
}

async function ensureRates(force) {
  const ts = state.profile.ratesUpdated || 0;
  const stale = Date.now() - ts > 12 * 60 * 60 * 1000; // 12h
  if (force || !state.profile.rates || stale) return await fetchRates();
  return true;
}

function convert(amount, from, to) {
  if (!amount || amount === 0) return 0;
  if (from === to) return amount;
  const r = state.profile.rates;
  if (!r || !r[from] || !r[to]) return amount; // sin tasas disponibles: no conversion
  return amount * r[to] / r[from];
}

function toPrimary(amount, currency) {
  return convert(amount, currency, state.profile.currency);
}

function hasMixedCurrencies() {
  const p = state.profile.currency;
  return state.debts.some(d => (d.currency || p) !== p);
}

function breakdownByCategory() {
  const a = active();
  const map = {};
  a.forEach(d => {
    const key = d.category || 'other';
    const amount = balanceInPrimary(d);
    if (!map[key]) map[key] = { key, label: categoryMeta(key).short, amount: 0, count: 0 };
    map[key].amount += amount;
    map[key].count++;
  });
  return Object.values(map).sort((a, b) => b.amount - a.amount);
}

// Explicación rica en lenguaje simple sobre por qué esta deuda es la prioritaria.
function explainPriority() {
  const a = active();
  if (a.length < 2) return null;
  const strat = currentStrategy();
  const p = priorityDebt();
  if (!p) return null;

  const pBal = balanceInPrimary(p);
  const pInt = pBal * (p.rate / 100 / 12); // interés/mes en moneda principal
  const pMin = minInPrimary(p);

  // Calcular impacto: tiempo ahorrado si cierra ESTA deuda primero vs la segunda opción
  const secondary = [...a].filter(d => d.id !== p.id).sort((x, y) =>
    strat === 'snowball' ? balanceInPrimary(x) - balanceInPrimary(y) : y.rate - x.rate
  )[0];

  let whyLine, impactLine;
  if (strat === 'avalanche') {
    whyLine = `Te cobra ${p.rate}% anual · ${fmt(pInt)} de intereses cada mes. Es la tasa más alta que tienes.`;
    impactLine = `Cada peso extra que dirijas aquí reduce intereses futuros más que en cualquier otra deuda. No es opinión — es matemática.`;
  } else {
    whyLine = `Es tu deuda más pequeña — ${fmt(pBal)}. Cerrarla está cerca.`;
    impactLine = `Al cerrarla liberas ${fmt(pMin)} de cuota mínima que puedes dirigir a la siguiente. Y el empuje emocional de cerrar una es real.`;
  }

  return { whyLine, impactLine, debt: p, secondary };
}

function computeTips() {
  const tips = [];
  const a = active();
  const dismissed = state.profile.dismissedTips || [];

  // Tip: cuotas mínimas que apenas cubren intereses
  const struggling = a.filter(d => {
    const int = d.balance * (d.rate / 100 / 12);
    return d.minPayment > 0 && d.minPayment < int * 1.15;
  });
  if (struggling.length > 0) {
    tips.push({
      id: 'min_payment_low',
      title: 'La mínima no es pago, es sostenimiento',
      body: `Tienes ${struggling.length === 1 ? 'una deuda' : struggling.length + ' deudas'} donde la cuota mínima apenas cubre intereses. En este ritmo no se cierra. Dos caminos: negociar tasa, o dirigir algo extra.`,
      cta: { label: 'Ver guion de negociación', kind: 'negotiate', debtId: struggling[0].id }
    });
  }

  // Tip: múltiples tarjetas
  const cards = a.filter(d => (d.category || '') === 'card');
  if (cards.length >= 3) {
    tips.push({
      id: 'multiple_cards',
      title: cards.length + ' tarjetas abiertas',
      body: 'Consolidar varias tarjetas en una sola línea de menor tasa suele ahorrar mucho en intereses. No es para todos, pero vale simular qué pasa.',
      cta: { label: 'Abrir simulador', kind: 'simulator' }
    });
  }

  // Tip: primera deuda registrada
  if (a.length === 1 && paid().length === 0) {
    tips.push({
      id: 'first_debt',
      title: 'Ya viste la primera',
      body: 'Registrar es más de la mitad. El cerebro deja de esquivar. Si hay más deudas, agrégalas sin prisa — hoy una, mañana otra.',
    });
  }

  // Tip: deuda familiar o informal
  const personal = a.filter(d => ['family','informal'].includes(d.category || ''));
  if (personal.length > 0) {
    tips.push({
      id: 'personal_debt',
      title: 'Deudas con personas',
      body: 'Los préstamos familiares o informales muchas veces se pueden reestructurar con una conversación honesta, no con un pago imposible. El silencio las hace más grandes.',
    });
  }

  // Tip: tasa muy alta en alguna deuda
  const veryHigh = a.find(d => d.rate > 35);
  if (veryHigh) {
    tips.push({
      id: 'very_high_rate',
      title: 'Tasa alta: negocia o cambia',
      body: `${esc(veryHigh.creditor)} te cobra ${veryHigh.rate}% anual. Es alto incluso para tarjeta. Llamar a pedir reducción cuesta 10 minutos y a veces funciona.`,
      cta: { label: 'Ver guion', kind: 'negotiate', debtId: veryHigh.id }
    });

  // Tip: ingreso no registrado con muchas deudas
  if (a.length >= 3 && !state.profile.income) {

      id: 'set_income',
      title: 'Sin ingreso registrado',

      cta: { label: 'Registrar ingreso', kind: 'setting', setting: 'income' }
    });
  }

  return tips.filter(t => !dismissed.includes(t.id)).slice(0, 2);
}

// Total inicial (suma de initialBalance convertida a moneda principal).
// Usa balance como fallback por si una deuda antigua no lo tiene.
function totalInitialDebt() {
  return state.debts.reduce((s, d) => {
    const init = d.initialBalance || d.balance || 0;
    return s + toPrimary(init, debtCcy(d));
  }, 0);
}

// Total ya pagado = suma de (initial - currentBalance) para todas.
// Para deudas cerradas, el balance es 0, así que el initial completo cuenta.
function totalPaidDebt() {
  return state.debts.reduce((s, d) => {
    const init = d.initialBalance || d.balance || 0;
    const current = d.paidOff ? 0 : (d.balance || 0);
    return s + toPrimary(Math.max(0, init - current), debtCcy(d));
  }, 0);
}

function progressPct() {
  const init = totalInitialDebt();
  if (init <= 0) return 0;
  return Math.min(1, totalPaidDebt() / init);
}

// Devuelve los IDs de hitos que deberían estar ganados según el state actual
function earnedMilestones() {
  const earned = [];
  const closed = state.debts.filter(d => d.paidOff).length;
  const total = state.debts.length;
  const pct = progressPct();

  if (closed >= 1) earned.push('first_paid');
  if (pct >= 0.25) earned.push('pct_25');
  if (pct >= 0.50) earned.push('pct_50');
  if (pct >= 0.75) earned.push('pct_75');
  if (total > 0 && closed === total) earned.push('all_paid');

  return earned;
}

// Compara hitos ganados vs ya notificados, encola los nuevos y muestra el primero.
async function checkMilestones() {
  if (!state.profile.unlockedMilestones) state.profile.unlockedMilestones = [];
  const earned = earnedMilestones();
  const unlocked = state.profile.unlockedMilestones;
  const newOnes = earned.filter(id => !unlocked.includes(id));

  if (newOnes.length === 0) return;

  state.profile.unlockedMilestones = [...unlocked, ...newOnes];
  await saveAll();

  if (!state.pendingMilestones) state.pendingMilestones = [];
  state.pendingMilestones.push(...newOnes);
  showNextMilestone();
}

// Saca el próximo milestone de la cola y arma el modal.
// Si hay más, tras cerrar se encadena con un pequeño delay.
function showNextMilestone() {
  if (!state.pendingMilestones || state.pendingMilestones.length === 0) return;
  const id = state.pendingMilestones.shift();
  const m = MILESTONES[id];
  if (!m) { showNextMilestone(); return; }

  state.modal = {
    kind: 'milestone',
    milestoneId: id,
    tag: m.tag,
    msg: m.msg,
    sub: m.sub,
    onConfirm: () => {
      state.modal = null;
      render();
      if (state.pendingMilestones && state.pendingMilestones.length > 0) {
        setTimeout(() => showNextMilestone(), 320);
      }
    }
  };
  render();
}

// ============== CALCS ==============
const active = () => state.debts.filter(d => !d.paidOff && d.balance > 0);
const paid = () => state.debts.filter(d => d.paidOff);
const debtCcy = (d) => d.currency || state.profile.currency;
const balanceInPrimary = (d) => toPrimary(d.balance, debtCcy(d));
const minInPrimary = (d) => toPrimary(d.minPayment || 0, debtCcy(d));
const totalDebt = () => active().reduce((s, d) => s + balanceInPrimary(d), 0);
const totalInterest = () => active().reduce((s, d) => s + balanceInPrimary(d) * (d.rate / 100 / 12), 0);
const totalMinimum = () => active().reduce((s, d) => s + minInPrimary(d), 0);

// Motor de simulación flexible.
// opts = { strategy?, extraMonthly?, lumpSum?:{amount,targetId}, rateOverride?:{id,rate}, balanceOverride?:{id,balance} }
// retorna { months, totalInterest, freedom } o { error }
function simulateScenario(opts) {
  const o = opts || {};
  const a = active();
  if (a.length === 0) return { months: 0, totalInterest: 0, freedom: new Date() };
  const strategy = o.strategy || currentStrategy();

  let debts = a.map(d => {
    let bal = balanceInPrimary(d);
    if (o.balanceOverride && o.balanceOverride.id === d.id) {
      bal = toPrimary(o.balanceOverride.balance, debtCcy(d));
    }
    let rate = d.rate;
    if (o.rateOverride && o.rateOverride.id === d.id) rate = o.rateOverride.rate;
    return {
      id: d.id,
      bal,
      rate: rate / 100 / 12,
      min: minInPrimary(d)
    };
  });

  // Pago único dirigido a una deuda específica
  if (o.lumpSum && o.lumpSum.amount > 0) {
    const target = debts.find(d => d.id === o.lumpSum.targetId);
    if (target) target.bal = Math.max(0, target.bal - o.lumpSum.amount);
  }

  const extra = o.extraMonthly || 0;
  const budget = debts.reduce((s, d) => s + d.min, 0) + extra;
  const minInterest = debts.reduce((s, d) => s + d.bal * d.rate, 0);
  if (budget <= minInterest) return { error: 'budget_insufficient' };

  let months = 0;
  let totalInterest = 0;
  const MAX = 720;

  while (debts.some(d => d.bal > 0.01) && months < MAX) {
    // Intereses del mes
    debts.forEach(d => {
      if (d.bal > 0) {
        const int = d.bal * d.rate;
        totalInterest += int;
        d.bal += int;
      }
    });
    // Cuotas mínimas
    let leftover = budget;
    debts.forEach(d => {
      if (d.bal > 0) {
        const p = Math.min(d.min, d.bal);
        d.bal -= p;
        leftover -= p;
      }
    });
    // Sobrante va a deuda prioritaria
    const act = debts.filter(d => d.bal > 0);
    if (leftover > 0.01 && act.length > 0) {
      const sorted = strategy === 'snowball'
        ? [...act].sort((a,b) => a.bal - b.bal)
        : [...act].sort((a,b) => b.rate - a.rate);
      const t = debts.find(d => d.id === sorted[0].id);
      if (t) t.bal -= Math.min(leftover, t.bal);
    }
    months++;
  }

  if (months >= MAX) return { error: 'too_long' };
  return { months, totalInterest, freedom: freedomDate(months) };
}

function simulatePayoff(strategy) {
  const r = simulateScenario({ strategy });
  if (r.error) return null;
  return r.months;
}

function freedomDate(months) {
  if (!months && months !== 0) return null;
  if (months === 0) return new Date();
  const d = new Date();
  d.setMonth(d.getMonth() + months);
  return d;
}

function recommendStrategy() {
  const a = active();
  if (a.length < 2) return 'avalanche';
  const rates = a.map(d => d.rate);
  return (Math.max(...rates) - Math.min(...rates) > 5) ? 'avalanche' : 'snowball';
}

function currentStrategy() {
  return state.profile.strategy === 'auto' ? recommendStrategy() : state.profile.strategy;
}

function priorityDebt() {
  const a = active();
  if (a.length === 0) return null;
  const s = currentStrategy();
  return [...a].sort((x, y) => s === 'snowball'
    ? balanceInPrimary(x) - balanceInPrimary(y)
    : y.rate - x.rate
  )[0];
}

function debtWarning(d) {
  const mi = d.balance * (d.rate / 100 / 12);
  if (d.minPayment < mi) return 'Tu cuota mínima es menor a los intereses. Esta deuda está creciendo.';
  if (d.minPayment < mi * 1.15) return 'La mínima apenas cubre intereses. Vas a tardar mucho.';
  return null;
}

// ============== FORMAT ==============
function fmt(n, currency) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const code = currency || state.profile.currency || 'COP';
  const c = currencyMeta(code);
  const value = c.decimals === 0 ? Math.round(n) : n;
  const formatted = value.toLocaleString(c.locale, {
    minimumFractionDigits: c.decimals,
    maximumFractionDigits: c.decimals
  });
  return c.symbol + formatted;
}
function fmtDate(d) {
  if (!d) return '—';
  const m = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return m[d.getMonth()] + ' ' + d.getFullYear();
}
function monthsText(m) {
  if (m === null || m === undefined) return 'No determinable';
  if (m === 0) return 'Hoy';
  if (m < 12) return m + (m === 1 ? ' mes' : ' meses');
  const y = Math.floor(m/12); const r = m % 12;
  let s = y + (y === 1 ? ' año' : ' años');
  if (r > 0) s += ' y ' + r + (r === 1 ? ' mes' : ' meses');
  return s;
}
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function renderDebtCard(d, isPriority) {
  const ccy = debtCcy(d);

  const warn = !d.paidOff ? debtWarning(d) : null;
  const convertedBalance = isForeign ? toPrimary(d.balance, ccy) : null;
  const convertedMin = isForeign ? toPrimary(d.minPayment || 0, ccy) : null;
  const convertedInt = isForeign ? toPrimary(monthlyInt, ccy) : null;
  const hasRates = !!state.profile.rates;
  const cat = categoryMeta(d.category || 'other');

  return `
    <div class="debt-card ${d.paidOff ? 'paid' : ''} ${isPriority ? 'priority' : ''}" data-edit-debt="${d.id}">
      <div class="debt-top">
        <div>
          <div class="debt-creditor">${esc(d.creditor)}${isPriority ? '<span class="priority-tag">Prioridad</span>' : ''}</div>
          <div class="debt-sub"><span class="category-pill" style="margin-left:0">${cat.short}</span> ${d.paidOff ? '· Cerrada' : `· Tasa ${d.rate}% · Vence día ${d.dueDay}${isForeign ? ' · ' + ccy : ''}`}</div>

        <div>

        </div>
      </div>
      ${!d.paidOff ? `
        <div class="debt-meta">
          <span>Cuota mín. <strong>${fmt(d.minPayment, ccy)}</strong></span>
          <span>Interés/mes <strong>${fmt(monthlyInt, ccy)}</strong></span>
        </div>
        ${warn ? `<div class="debt-warn">${warn}</div>` : ''}
        ${(() => {
          const init = d.initialBalance || d.balance;
          if (!init || init <= d.balance) return '';
          const reduction = init - d.balance;

// Genera SOLO la sección de resultado + footer condicional del simulador.
// Separada de viewSimulator para permitir actualizaciones parciales del DOM
// sin destruir los inputs donde el usuario está tecleando (que en móvil
// causaba pérdida de foco y cierre del teclado virtual).
function buildSimResultHTML() {
  const a = active();
  if (a.length === 0) return '';
  const mode = state.simMode || 'extra';
  const baseline = simulateScenario();
  const primary = state.profile.currency;

  let scenarioOpts = {};
  if (mode === 'extra') {
    scenarioOpts = { extraMonthly: toPrimary(state.simExtra || 0, primary) };
  } else if (mode === 'lumpSum') {
    const targetId = state.simLumpTarget || (priorityDebt() && priorityDebt().id) || a[0].id;
    scenarioOpts = { lumpSum: { amount: toPrimary(state.simLumpAmount || 0, primary), targetId } };
  } else if (mode === 'rate') {
    const targetId = state.simRateTarget || (priorityDebt() && priorityDebt().id) || a[0].id;
    const target = a.find(x => x.id === targetId) || a[0];
    const newRate = state.simNewRate !== undefined ? state.simNewRate : Math.max(0, target.rate - 5);
    scenarioOpts = { rateOverride: { id: targetId, rate: parseFloat(newRate) || 0 } };
  }

  const scenario = simulateScenario(scenarioOpts);
  const savedMonths = baseline.error || scenario.error ? null : Math.max(0, baseline.months - scenario.months);
  const savedInterest = baseline.error || scenario.error ? null : Math.max(0, baseline.totalInterest - scenario.totalInterest);

  let resultHtml;
  if (scenario.error === 'budget_insufficient') {
    resultHtml = `
      <div class="sim-result error">
        <div class="sim-result-title">Las cuotas no alcanzan ni para los intereses</div>
        <div class="sim-result-body">En este escenario la deuda nunca se cerraría. Prueba con un extra mayor, o primero negocia tasas.</div>
      </div>
    `;
  } else if (scenario.error) {
    resultHtml = `<div class="sim-result error"><div class="sim-result-title">Escenario muy largo</div><div class="sim-result-body">El cálculo supera 60 años. Ajusta los números.</div></div>`;
  } else {
    const noChange = savedMonths === 0 && savedInterest < 1;
    resultHtml = `
      <div class="sim-result">
        <div class="sim-delta-grid">
          <div class="sim-delta">
            <div class="sim-delta-label">Nueva libertad</div>
            <div class="sim-delta-val">${fmtDate(scenario.freedom)}</div>
            ${baseline.freedom && !noChange ? `<div class="sim-delta-sub">antes: ${fmtDate(baseline.freedom)}</div>` : ''}
          </div>
          <div class="sim-delta">
            <div class="sim-delta-label">Meses ${savedMonths > 0 ? 'ahorrados' : 'más'}</div>
            <div class="sim-delta-val ${savedMonths > 0 ? 'positive' : ''}">${savedMonths != null ? (savedMonths > 0 ? '−' + savedMonths : savedMonths) : '—'}</div>
          </div>
          <div class="sim-delta">
            <div class="sim-delta-label">Intereses ahorrados</div>
            <div class="sim-delta-val ${savedInterest > 1 ? 'positive' : ''}">${savedInterest != null ? fmt(savedInterest) : '—'}</div>
          </div>
        </div>
        ${noChange ? `<div class="sim-note">Ajusta los números arriba para ver el impacto.</div>` : ''}
      </div>
    `;
  }

  const footerHtml = (mode === 'rate' && !scenario.error) ? `
    <div class="note-card" style="margin-top: 20px;">
      <div class="note-title">¿Cómo lograr esa tasa?</div>
      <div class="note-body">Hay un guion listo para pedir reducción. Toma 10 minutos llamar.</div>
      <button class="btn btn-secondary mt-sm" data-open-negotiate="${state.simRateTarget || a[0].id}">Ver guion de negociación</button>
    </div>
  ` : '';

  return resultHtml + footerHtml;
}

// Actualización parcial: reemplaza solo la sección dinámica del simulador

function updateSimResult() {
  const container = document.getElementById('sim-dynamic');

function renderModal() {
  if (!state.modal) return '';
  const m = state.modal;

  // Variante milestone — celebración de hito. Reutiliza .milestone-card como protagonista

    return `

          <div class="milestone-card">

          </div>
          <button class="btn milestone-confirm" data-modal-confirm>Seguir</button>
        </div>
      </div>
    `;
  }

  // Para listas largas (moneda: 12 opciones), usar un listado compacto con marca de "actual"
  const useCompactList = m.options && m.options.length > 4;
  const currentValue = m.kind === 'currency' ? state.profile.currency : (m.kind === 'strategy' ? state.profile.strategy : null);
  let optionsHtml = '';
  if (m.options) {
    if (useCompactList) {
      optionsHtml = `
        <div class="modal-option-list">
          ${m.options.map(o => `<button data-modal-option="${o.value}" class="${o.value === currentValue ? 'current' : ''}">${o.label}</button>`).join('')}
        </div>
        <button class="btn-ghost" data-modal-close>Cancelar</button>
      `;
    } else {
      optionsHtml = `

        </div>
        <button class="btn-ghost mt-sm" data-modal-close>Cancelar</button>
      `;
    }
  }
  return `
    <div class="modal-backdrop" data-modal-close>
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">${m.title}</div>
        <div class="modal-body">${m.body}</div>
        ${m.input ? `<div class="field"><input class="field-input" id="modal-input" type="${m.inputType || 'text'}" value="${esc(m.inputValue || '')}" placeholder="${esc(m.placeholder || '')}" ${m.inputType === 'number' ? 'inputmode="numeric"' : ''} autofocus></div>` : ''}
        ${m.options ? optionsHtml : `
        <div class="btn-row mt-md">

          <button class="btn ${m.danger ? 'btn-danger' : ''}" data-modal-confirm>${m.confirmText || 'Aceptar'}</button>
        </div>
        `}
      </div>
    </div>
  `;
}

// ============== RENDER ==============
function render() {
  const app = document.getElementById('app');

  // Preservar foco + posición del cursor antes del rerender.
  // Sin esto, cualquier cambio de state.X seguido de render() destruye el input y saca al usuario del campo.
  const activeEl = document.activeElement;
  let focusId = null;
  let selStart = null;
  let selEnd = null;
  if (activeEl && activeEl.id && app.contains(activeEl)) {
    focusId = activeEl.id;
    // selectionStart/End no está disponible en type="number" ni en selects; lo envolvemos.
    try { selStart = activeEl.selectionStart; selEnd = activeEl.selectionEnd; } catch (_) { /* no-op */ }
  }

  let html = '';
  switch (state.view) {
    case 'welcome': html = viewWelcome(); break;
    case 'onboarding': html = viewOnboarding(); break;
    case 'pin-setup': html = viewPinSetup(); break;
    case 'pin-lock': html = viewPinLock(); break;
    case 'first-debt': html = viewFirstDebt(); break;
    case 'dashboard': html = viewDashboard(); break;
    case 'add-debt': html = viewAddDebt(); break;
    case 'plan': html = viewPlan(); break;
    case 'settings': html = viewSettings(); break;
    case 'simulator': html = viewSimulator(); break;
    case 'negotiate': html = viewNegotiate(); break;
    default: html = '<div class="screen"></div>';
  }
  app.innerHTML = html + renderModal();
  attachEvents();

  // Restaurar foco: si había un input/select con id enfocado antes, devolverle el foco
  // y la posición del cursor. Si no, caer al comportamiento original de autofocus.
  if (focusId) {
    const restored = document.getElementById(focusId);
    if (restored) {
      restored.focus();
      if (selStart != null) {
        try { restored.setSelectionRange(selStart, selEnd); } catch (_) { /* tipo no soporta selección */ }
      }
    }
  } else {
    const firstInput = app.querySelector('input[autofocus]');
    if (firstInput) setTimeout(() => firstInput.focus(), 60);
  }
}

// ============== EVENTS ==============
function attachEvents() {
  document.querySelectorAll('[data-go]').forEach(el => el.addEventListener('click', () => goTo(el.dataset.go)));
  const nb = document.querySelector('[data-onb-next]'); if (nb) nb.addEventListener('click', handleOnbNext);
  const sb = document.querySelector('[data-onb-skip]'); if (sb) sb.addEventListener('click', handleOnbSkip);
  const bb = document.querySelector('[data-onb-back]'); if (bb) bb.addEventListener('click', handleOnbBack);
  document.querySelectorAll('[data-pin-choice]').forEach(el => el.addEventListener('click', () => handlePinChoice(el.dataset.pinChoice)));
  document.querySelectorAll('[data-currency-onb]').forEach(el => el.addEventListener('click', () => handleOnbCurrency(el.dataset.currencyOnb)));
  document.querySelectorAll('[data-currency-pick]').forEach(el => el.addEventListener('click', () => handleDebtCurrencyPick(el.dataset.currencyPick)));
  document.querySelectorAll('[data-pin-key]').forEach(el => el.addEventListener('click', () => handlePinKey(el.dataset.pinKey)));
  const pc = document.querySelector('[data-pin-cancel]'); if (pc) pc.addEventListener('click', handlePinCancel);
  const form = document.getElementById('debt-form'); if (form) form.addEventListener('submit', handleDebtSubmit);
  document.querySelectorAll('[data-edit-debt]').forEach(el => {
    el.addEventListener('click', (e) => {
      // No editar si el click viene de un botón V2 dentro de la tarjeta
      if (e.target.closest('[data-negotiate-debt], .tip-cta, button')) return;
      const d = state.debts.find(x => x.id === el.dataset.editDebt);
      if (d && !d.paidOff) { state.editingDebt = d; goTo('add-debt'); }
    });
  });
  const mp = document.querySelector('[data-mark-paid]'); if (mp) mp.addEventListener('click', () => handleMarkPaid(mp.dataset.markPaid));
  const dd = document.querySelector('[data-delete-debt]'); if (dd) dd.addEventListener('click', () => handleDeleteDebt(dd.dataset.deleteDebt));
  const ts = document.querySelector('[data-toggle-strategy]'); if (ts) ts.addEventListener('click', handleStrategyToggle);
  document.querySelectorAll('[data-setting]').forEach(el => el.addEventListener('click', () => handleSetting(el.dataset.setting)));
  document.querySelectorAll('[data-modal-close]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target === el || el.hasAttribute('data-modal-close')) {
        if (e.target === el) { state.modal = null; render(); }
      }
    });
  });
  const mc = document.querySelector('[data-modal-confirm]'); if (mc) mc.addEventListener('click', handleModalConfirm);
  document.querySelectorAll('[data-modal-option]').forEach(el => el.addEventListener('click', () => handleModalOption(el.dataset.modalOption)));

  // ========== V2 event bindings ==========
  document.querySelectorAll('[data-sim-mode]').forEach(el => el.addEventListener('click', () => handleSimMode(el.dataset.simMode)));
  // Para los inputs del simulador NO llamamos render() — solo updateSimResult().
  // Esto preserva foco, cursor y teclado virtual (crítico en móvil con type="number").
  const simExtraInput = document.getElementById('sim-extra-input');
  if (simExtraInput) simExtraInput.addEventListener('input', (e) => { state.simExtra = parseFloat(e.target.value) || 0; updateSimResult(); });
  const simLumpInput = document.getElementById('sim-lump-input');
  if (simLumpInput) simLumpInput.addEventListener('input', (e) => { state.simLumpAmount = parseFloat(e.target.value) || 0; updateSimResult(); });
  const simLumpTarget = document.getElementById('sim-lump-target');
  if (simLumpTarget) simLumpTarget.addEventListener('change', (e) => { state.simLumpTarget = e.target.value; updateSimResult(); });
  const simRateInput = document.getElementById('sim-rate-input');
  if (simRateInput) simRateInput.addEventListener('input', (e) => { state.simNewRate = parseFloat(e.target.value) || 0; updateSimResult(); });
  const simRateTarget = document.getElementById('sim-rate-target');
  if (simRateTarget) simRateTarget.addEventListener('change', (e) => {
    state.simRateTarget = e.target.value;
    // Al cambiar deuda objetivo, sugerir nueva tasa 5pp abajo de la actual.
    // Requerimos full render aquí porque el valor del input de tasa necesita actualizarse.
    const t = state.debts.find(x => x.id === e.target.value);
    state.simNewRate = t ? Math.max(0, t.rate - 5) : 0;
    render();
  });
  document.querySelectorAll('[data-neg-script]').forEach(el => el.addEventListener('click', () => { state.negScriptId = el.dataset.negScript; render(); }));
  document.querySelectorAll('[data-copy-script]').forEach(el => el.addEventListener('click', () => handleCopyScript(el.dataset.copyScript)));
  document.querySelectorAll('[data-negotiate-debt]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); state.negotiatingDebt = el.dataset.negotiateDebt; state.negScriptId = null; goTo('negotiate'); }));
  document.querySelectorAll('[data-open-negotiate]').forEach(el => el.addEventListener('click', () => { state.negotiatingDebt = el.dataset.openNegotiate; state.negScriptId = null; goTo('negotiate'); }));
  document.querySelectorAll('[data-dismiss-tip]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); dismissTip(el.dataset.dismissTip); }));
  document.querySelectorAll('[data-tip-cta]').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    try {
      const cta = JSON.parse(el.dataset.tipCta.replace(/&apos;/g, "'"));
      if (cta.kind === 'simulator') goTo('simulator');
      else if (cta.kind === 'negotiate' && cta.debtId) { state.negotiatingDebt = cta.debtId; goTo('negotiate'); }
      else if (cta.kind === 'setting' && cta.setting) { goTo('settings'); setTimeout(() => handleSetting(cta.setting), 100); }
    } catch (err) { console.error('tip cta', err); }
  }));
}

function goTo(view) {
  if (view === 'onboarding') state.onbStep = 0;
  if (view === 'dashboard') state.editingDebt = null;
  if (view === 'add-debt' && !state.editingDebt) state.editingDebt = null;
  // Al salir del formulario de deuda, limpiar el draft y la selección temporal de moneda
  if (view !== 'add-debt' && view !== 'first-debt') {
    state.debtFormDraft = null;
    state.tempDebtCurrency = null;
  }
  state.view = view;
  state.pinError = false;
  render();
  window.scrollTo(0, 0);
}

function handleOnbNext() {
  const input = document.getElementById('onb-input');
  const val = input ? input.value.trim() : '';
  if (state.onbStep === 0) state.profile.name = val;
  else if (state.onbStep === 2) state.profile.income = val ? parseFloat(val) : 0;
  // Paso 1 (moneda) ya se guardó con el click del pill
  state.onbStep++;
  // Al pasar de moneda a ingreso, disparar fetch de tasas en background
  if (state.onbStep === 2) ensureRates().then(() => render());
  render();
}
function handleOnbSkip() { state.onbStep++; render(); }
function handleOnbBack() {
  if (state.onbStep > 0) { state.onbStep--; render(); }
  else { state.view = 'welcome'; render(); }
}

async function handleOnbCurrency(code) {
  state.profile.currency = code;
  await saveAll();
  // Avanzar automáticamente al siguiente paso
  state.onbStep++;
  // Disparar fetch de tasas en background
  ensureRates().then(() => render());
  render();
}

async function handlePinChoice(choice) {
  if (choice === 'yes') {
    state.pinInput = ''; state.pinStage = 'enter'; state.tempPin = ''; state.pinError = false;
    state.view = 'pin-setup'; render();
  } else {
    if (!state.profile.createdAt) state.profile.createdAt = Date.now();
    await saveAll();
    state.view = 'first-debt'; render();
  }
}

function handlePinCancel() {
  state.pinInput = ''; state.pinStage = 'enter'; state.tempPin = ''; state.pinError = false;
  if (!state.profile.createdAt) { state.view = 'onboarding'; state.onbStep = 3; }
  else state.view = 'settings';
  render();
}

async function handlePinKey(key) {
  state.pinError = false;
  if (state.view === 'pin-setup') {
    if (key === 'del') { state.pinInput = state.pinInput.slice(0, -1); render(); return; }
    if (state.pinInput.length < 4) {
      state.pinInput += key;
      render();
      if (state.pinInput.length === 4) {
        setTimeout(async () => {
          if (state.pinStage === 'enter') {
            state.tempPin = state.pinInput; state.pinInput = ''; state.pinStage = 'confirm'; render();
          } else {
            if (state.pinInput === state.tempPin) {
              state.profile.pin = state.tempPin;
              if (!state.profile.createdAt) state.profile.createdAt = Date.now();
              state.unlocked = true;
              await saveAll();
              state.pinInput = ''; state.tempPin = ''; state.pinStage = 'enter';
              state.view = state.debts.length === 0 ? 'first-debt' : 'settings';
              render();
            } else {
              state.pinError = true; state.pinInput = ''; state.tempPin = ''; state.pinStage = 'enter';
              render();
              setTimeout(() => { state.pinError = false; render(); }, 1600);
            }
          }
        }, 180);
      }
    }
  } else if (state.view === 'pin-lock') {
    if (key === 'del') { state.pinInput = state.pinInput.slice(0, -1); render(); return; }
    if (state.pinInput.length < 4) {
      state.pinInput += key;
      render();
      if (state.pinInput.length === 4) {
        setTimeout(() => {
          if (state.pinInput === state.profile.pin) {
            state.unlocked = true; state.pinInput = ''; state.view = 'dashboard'; render();
          } else {
            state.pinError = true; state.pinInput = '';
            render();
            setTimeout(() => { state.pinError = false; render(); }, 1600);
          }
        }, 180);
      }
    }
  }
}

async function handleDebtSubmit(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const currency = fd.get('currency') || state.profile.currency;
  const data = {
    creditor: (fd.get('creditor') || '').trim(),
    category: fd.get('category') || 'other',
    balance: parseFloat(fd.get('balance')) || 0,
    rate: parseFloat(fd.get('rate')) || 0,
    minPayment: parseFloat(fd.get('minPayment')) || 0,
    dueDay: parseInt(fd.get('dueDay')) || 1,
    currency: currency
  };
  if (state.editingDebt) {
    // Proteger initialBalance: si el usuario edita y el nuevo balance SUPERA el initial
    // (típicamente porque corrige un error de entrada), actualizamos initial.
    // Si el balance BAJA (pagó algo), initial se queda igual para que el tracking funcione.
    const currentInitial = state.editingDebt.initialBalance || state.editingDebt.balance || 0;
    if (data.balance > currentInitial) {
      data.initialBalance = data.balance;
    }
    Object.assign(state.editingDebt, data);
  } else {
    state.debts.push({
      id: uid(),
      ...data,
      initialBalance: data.balance,
      createdAt: Date.now(),
      paidOff: false
    });
  }
  await saveAll();
  state.editingDebt = null;
  state.tempDebtCurrency = null;
  state.debtFormDraft = null;
  // Si hay deudas en moneda extranjera, intentar refrescar tasas
  if (hasMixedCurrencies()) ensureRates();
  state.view = 'dashboard';
  render();
  // Check milestones después del render — si hay un hito nuevo (ej: usuario reportó
  // un pago que bajó el balance), aparece la milestone-card sobre el dashboard.
  setTimeout(() => checkMilestones(), 200);
}

function handleDebtCurrencyPick(code) {
  // Antes del re-render, capturar los valores que el usuario ya escribió en el formulario.
  // Sin esto, cambiar de moneda borraría campos como "¿A quién le debes?", saldo, tasa, etc.
  captureDebtFormState();
  if (state.editingDebt) {
    state.editingDebt.currency = code;
  } else {
    state.tempDebtCurrency = code;
  }
  // Si eligió moneda distinta a la principal, asegurar tasas
  if (code !== state.profile.currency) ensureRates();
  render();
}

// Lee los valores actuales del formulario y los guarda en state antes de un re-render
// que destruiría el DOM. Para deudas nuevas, lo guarda en state.debtFormDraft.
// Para edición, actualiza el objeto editingDebt directamente.
function captureDebtFormState() {
  const form = document.getElementById('debt-form');
  if (!form) return;
  const fd = new FormData(form);
  const creditor = (fd.get('creditor') || '').trim();
  const category = fd.get('category') || 'other';
  const balanceRaw = fd.get('balance') || '';
  const rateRaw = fd.get('rate') || '';
  const minPayRaw = fd.get('minPayment') || '';
  const dueDayRaw = fd.get('dueDay') || '';

  if (state.editingDebt) {
    // Mutar el objeto que está siendo editado con lo que el usuario ya escribió
    if (creditor) state.editingDebt.creditor = creditor;
    state.editingDebt.category = category;
    const balNum = parseFloat(balanceRaw);
    if (!isNaN(balNum)) state.editingDebt.balance = balNum;
    const rNum = parseFloat(rateRaw);
    if (!isNaN(rNum)) state.editingDebt.rate = rNum;
    const mNum = parseFloat(minPayRaw);
    if (!isNaN(mNum)) state.editingDebt.minPayment = mNum;
    const dNum = parseInt(dueDayRaw);
    if (!isNaN(dNum)) state.editingDebt.dueDay = dNum;
  } else {
    // Deuda nueva: guardar en un draft
    state.debtFormDraft = {
      creditor,
      category,
      balance: balanceRaw,
      rate: rateRaw,
      minPayment: minPayRaw,
      dueDay: dueDayRaw
    };
  }
}

async function handleMarkPaid(id) {
  state.modal = {
    title: 'Cerrar esta deuda',
    body: '¿Ya la pagaste por completo? Queda archivada como cerrada.',
    confirmText: 'Sí, está cerrada',
    onConfirm: async () => {
      const d = state.debts.find(x => x.id === id);
      if (d) { d.paidOff = true; d.paidOffAt = Date.now(); d.balance = 0; }
      await saveAll();

      // Volver al dashboard para que lo que venga (milestone o modal) se vea sobre él
      state.editingDebt = null;
      state.view = 'dashboard';

      // Si cerrar esta deuda destapa un hito nuevo, celebramos el hito (más
      // emocional y específico). Si no, mostramos el modal genérico de "una menos".
      const earned = earnedMilestones();
      const unlocked = state.profile.unlockedMilestones || [];
      const newOnes = earned.filter(mid => !unlocked.includes(mid));

      if (newOnes.length > 0) {
        state.modal = null;
        render();
        setTimeout(() => checkMilestones(), 250);
      } else {
        const remaining = active().length;
        state.modal = {
          title: 'Una deuda menos',
          body: remaining === 0
            ? 'Las cerraste todas. Eso no es poca cosa. Respira.'
            : `Eso es real. Quedan ${remaining} ${remaining === 1 ? 'deuda' : 'deudas'}. El camino sigue.`,
          confirmText: 'Continuar',
          singleAction: true,
          onConfirm: () => { state.modal = null; render(); }
        };
        render();
      }
    }
  };
  render();
}

async function handleDeleteDebt(id) {
  state.modal = {
    title: 'Eliminar esta deuda',
    body: 'La borra por completo del registro. Usa "Ya la pagué" si la cerraste — así se preserva el progreso.',
    confirmText: 'Eliminar',
    danger: true,
    onConfirm: async () => {
      state.debts = state.debts.filter(d => d.id !== id);
      await saveAll();
      state.modal = null; state.editingDebt = null; state.view = 'dashboard'; render();
    }
  };
  render();
}

async function handleStrategyToggle() {
  const current = currentStrategy();
  state.profile.strategy = current === 'avalanche' ? 'snowball' : 'avalanche';
  await saveAll();
  render();
}

async function handleSetting(setting) {
  if (setting === 'name') {
    state.modal = {
      title: 'Cambiar nombre',
      body: 'Puede ser cualquier cosa. Nadie más lo verá.',
      input: true, inputValue: state.profile.name, placeholder: 'Tu nombre o apodo',
      onConfirm: async () => {
        state.profile.name = (document.getElementById('modal-input').value || '').trim();
        await saveAll(); state.modal = null; render();
      }
    };
  } else if (setting === 'income') {
    state.modal = {
      title: 'Ingreso mensual',
      body: 'Opcional. Solo para calcular proporciones en el plan semanal.',
      input: true, inputType: 'number', inputValue: state.profile.income || '', placeholder: '2000000',
      onConfirm: async () => {
        state.profile.income = parseFloat(document.getElementById('modal-input').value) || 0;
        await saveAll(); state.modal = null; render();
      }
    };
  } else if (setting === 'pin') {
    if (state.profile.pin) {
      state.modal = {
        title: 'Quitar PIN',
        body: 'Ya no se pedirá al abrir la app. Puedes volver a activarlo cuando quieras.',
        confirmText: 'Quitar', danger: true,
        onConfirm: async () => {
          state.profile.pin = null; await saveAll(); state.modal = null; render();
        }
      };
    } else {
      state.pinInput = ''; state.pinStage = 'enter'; state.tempPin = ''; state.pinError = false;
      state.view = 'pin-setup';
    }
  } else if (setting === 'strategy') {
    state.modal = {
      kind: 'strategy',
      title: 'Estrategia de pago',
      body: 'Cómo priorizar cuando tengas dinero extra.',
      options: [
        { value: 'auto', label: 'Automática (recomendada)' },
        { value: 'avalanche', label: 'Avalancha · tasa más alta primero' },
        { value: 'snowball', label: 'Bola de nieve · la más pequeña primero' }
      ]
    };
  } else if (setting === 'currency') {
    state.modal = {
      kind: 'currency',
      title: 'Moneda principal',
      body: 'Todas las sumas totales se muestran aquí. Puedes tener deudas en otras monedas — se convierten automáticamente.',
      options: Object.keys(CURRENCIES).map(code => ({
        value: code,
        label: `${code} · ${CURRENCIES[code].name}`
      }))
    };
  } else if (setting === 'wipe') {
    state.modal = {
      title: '¿Borrar todo?',
      body: 'Todas tus deudas, tu nombre, tu PIN. No hay vuelta atrás.',
      confirmText: 'Sí, borrar todo', danger: true,
      onConfirm: async () => {
        await wipeAll(); state.modal = null; state.view = 'welcome'; render();
      }
    };
  }
  render();
}

async function handleModalConfirm() {
  if (state.modal && state.modal.onConfirm) await state.modal.onConfirm();
  else { state.modal = null; render(); }
}

async function handleModalOption(value) {
  const kind = state.modal ? state.modal.kind : 'strategy';
  if (kind === 'currency') {
    state.profile.currency = value;
    // Si las tasas no existen o son stale, refrescar
    if (!state.profile.rates) {
      await fetchRates();
    }
  } else {
    state.profile.strategy = value;
  }
  await saveAll();
  state.modal = null;
  render();
}

// ============== V2 HANDLERS ==============
function handleSimMode(mode) {
  state.simMode = mode;
  // Reset inputs al cambiar de modo para evitar arrastrar valores
  if (mode === 'extra') state.simExtra = state.simExtra || 0;
  if (mode === 'lumpSum') {
    state.simLumpAmount = state.simLumpAmount || 0;
    if (!state.simLumpTarget) {
      const p = priorityDebt();
      state.simLumpTarget = p ? p.id : (active()[0] && active()[0].id);
    }
  }
  if (mode === 'rate') {
    if (!state.simRateTarget) {
      const p = priorityDebt();
      state.simRateTarget = p ? p.id : (active()[0] && active()[0].id);
    }
    if (state.simNewRate === undefined) {
      const t = state.debts.find(x => x.id === state.simRateTarget);
      state.simNewRate = t ? Math.max(0, t.rate - 5) : 0;
    }
  }
  render();
}

async function handleCopyScript(scriptId) {
  const d = state.debts.find(x => x.id === state.negotiatingDebt);
  if (!d) return;
  const scripts = generateScripts(d);
  const s = scripts.find(x => x.id === scriptId);
  if (!s) return;
  try {
    await navigator.clipboard.writeText(s.body);
    showToast('Guion copiado al portapapeles');
  } catch (e) {
    // Fallback para navegadores sin clipboard API
    const ta = document.createElement('textarea');
    ta.value = s.body;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('Guion copiado'); } catch (_) { showToast('No se pudo copiar — copia manual'); }
    document.body.removeChild(ta);
  }
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ============== INIT ==============
async function init() {
  await loadAll();

  // Silent initialization de milestones:
  // Si el usuario ya tiene cuenta pero nunca se le setearon unlockedMilestones
  // (viene de una versión anterior del app), marcamos silenciosamente los hitos
  // que ya había cruzado. Así la próxima vez sólo se celebran los NUEVOS.
  if (state.profile.createdAt && !state.profile.unlockedMilestones) {
    state.profile.unlockedMilestones = earnedMilestones();
    await saveAll();
  }

  // Disparar fetch de tasas en background (no bloquea render inicial)
  if (state.profile.createdAt) {
    ensureRates().then((ok) => {
      if (ok && hasMixedCurrencies()) render();
    });
  }
  if (!state.profile.createdAt) state.view = 'welcome';
  else if (state.profile.pin) state.view = 'pin-lock';
  else { state.unlocked = true; state.view = 'dashboard'; }
  render();
}

// Keyboard for PIN
document.addEventListener('keydown', (e) => {
  if (state.view !== 'pin-setup' && state.view !== 'pin-lock') return;
  if (/^[0-9]$/.test(e.key)) { handlePinKey(e.key); e.preventDefault(); }
  else if (e.key === 'Backspace') { handlePinKey('del'); e.preventDefault(); }
});

init();
</script>
